&lt;script&gt;
/* ============ SUBTAB SWITCHING ============ */
function setSubtab(name){
  document.querySelectorAll(&#x27;.subtab&#x27;).forEach(el=&gt; el.classList.toggle(&#x27;active&#x27;, el.dataset.sub===name));
  document.getElementById(&#x27;subview-input&#x27;).classList.toggle(&#x27;active&#x27;, name===&#x27;input&#x27;);
  document.getElementById(&#x27;subview-overlap&#x27;).classList.toggle(&#x27;active&#x27;, name===&#x27;overlap&#x27;);
  if(name === &#x27;overlap&#x27;){
    checkOverlapAuth();
  }
}

/* ============ SHARED SLOT DEFINITIONS ============ */
const DAYS = [
  {date:&#x27;7/6&#x27;, label:&#x27;7월 6일&#x27;, dow:&#x27;(월)&#x27;},
  {date:&#x27;7/7&#x27;, label:&#x27;7월 7일&#x27;, dow:&#x27;(화)&#x27;},
  {date:&#x27;7/8&#x27;, label:&#x27;7월 8일&#x27;, dow:&#x27;(수)&#x27;},
  {date:&#x27;7/9&#x27;, label:&#x27;7월 9일&#x27;, dow:&#x27;(목)&#x27;},
  {date:&#x27;7/10&#x27;, label:&#x27;7월 10일&#x27;, dow:&#x27;(금)&#x27;},
];
const HOURS = [9,10,11,12,13,14,15,16,17];
function slotId(date, hour){ return `${date}_${hour}`; }
function timeLabel(hour){ return `${String(hour).padStart(2,&#x27;0&#x27;)}:00`; }
function escapeHtml(s){
  return (s||&#x27;&#x27;).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g, m=&gt;({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#39;&#x27;}[m]));
}

/* ============ INPUT FORM LOGIC ============ */
const selected = new Set();

function renderGrid(){
  const grid = document.getElementById(&#x27;slot-grid&#x27;);
  let html = &#x27;&#x27;;
  html += `&lt;div class=&quot;gcell ghead&quot;&gt;&lt;/div&gt;`;
  DAYS.forEach(d=&gt;{
    html += `&lt;div class=&quot;gcell ghead&quot;&gt;&lt;span&gt;${d.label}&lt;/span&gt;&lt;span class=&quot;dow&quot;&gt;${d.dow}&lt;/span&gt;&lt;/div&gt;`;
  });
  HOURS.forEach(h=&gt;{
    html += `&lt;div class=&quot;gcell gtime&quot;&gt;${timeLabel(h)}&lt;/div&gt;`;
    DAYS.forEach(d=&gt;{
      const id = slotId(d.date, h);
      html += `&lt;div class=&quot;gcell gslot&quot; data-id=&quot;${id}&quot; onclick=&quot;toggleSlot(&#x27;${id}&#x27;)&quot;&gt;&lt;/div&gt;`;
    });
  });
  grid.innerHTML = html;
}
renderGrid();

function toggleSlot(id){
  if(selected.has(id)) selected.delete(id);
  else selected.add(id);
  refreshGridUI();
}
function refreshGridUI(){
  document.querySelectorAll(&#x27;#slot-grid .gslot&#x27;).forEach(el=&gt;{
    el.classList.toggle(&#x27;selected&#x27;, selected.has(el.dataset.id));
  });
  document.getElementById(&#x27;selected-count&#x27;).textContent = `선택됨: ${selected.size}개`;
}

document.getElementById(&#x27;select-all-btn&#x27;).addEventListener(&#x27;click&#x27;, ()=&gt;{
  DAYS.forEach(d=&gt; HOURS.forEach(h=&gt; selected.add(slotId(d.date,h))));
  refreshGridUI();
});
document.getElementById(&#x27;clear-all-btn&#x27;).addEventListener(&#x27;click&#x27;, ()=&gt;{
  selected.clear();
  refreshGridUI();
});

async function submitSlots(){
  const name = document.getElementById(&#x27;interviewer-name&#x27;).value.trim();
  const err = document.getElementById(&#x27;form-err&#x27;);
  if(!name || selected.size === 0){
    err.style.display = &#x27;block&#x27;;
    return;
  }
  err.style.display = &#x27;none&#x27;;

  const btn = document.getElementById(&#x27;submit-btn&#x27;);
  btn.disabled = true;
  btn.textContent = &#x27;제출 중…&#x27;;

  const slotsArray = [...selected];

  try{
    const { error } = await window.__sb.from(&#x27;interviewer_slots&#x27;).upsert({
      interviewer_name: name,
      available_slots: slotsArray,
      updated_at: new Date().toISOString()
    }, { onConflict: &#x27;interviewer_name&#x27; });

    if(error){ throw error; }

    document.getElementById(&#x27;screen-form&#x27;).style.display = &#x27;none&#x27;;
    document.getElementById(&#x27;screen-done&#x27;).style.display = &#x27;block&#x27;;
  }catch(e){
    console.error(&#x27;제출 실패:&#x27;, e);
    btn.disabled = false;
    btn.textContent = &#x27;제출하기&#x27;;
    err.style.display = &#x27;block&#x27;;
    err.textContent = &#x27;제출 중 오류가 발생했습니다. 다시 시도해주세요.&#x27;;
  }
}

/* ============ OVERLAP (HR) LOGIC ============ */
let interviewers = [];
let currentHrView = &#x27;overlap&#x27;;
let activeInterviewer = null;
let overlapAuthChecked = false;
let selectedInterviewerNames = new Set();

function checkOverlapAuth(){
  const overlay = document.getElementById(&#x27;dc-login-overlay&#x27;);
  const appEl = document.getElementById(&#x27;app-overlap&#x27;);
  window.__sb.auth.getSession().then(function(res){
    if(res &amp;&amp; res.data &amp;&amp; res.data.session){
      overlay.classList.remove(&#x27;visible&#x27;);
      appEl.style.display = &#x27;block&#x27;;
      if(!overlapAuthChecked){
        overlapAuthChecked = true;
        loadInterviewerSlots();
      }
    } else {
      overlay.classList.add(&#x27;visible&#x27;);
      appEl.style.display = &#x27;none&#x27;;
    }
  });
}

(function setupLogin(){
  const sb = window.__sb;
  const overlay = document.getElementById(&#x27;dc-login-overlay&#x27;);
  const appEl = document.getElementById(&#x27;app-overlap&#x27;);
  const btn = document.getElementById(&#x27;dc-login-btn&#x27;);
  const errEl = document.getElementById(&#x27;dc-login-err&#x27;);

  async function attempt(){
    const email = document.getElementById(&#x27;dc-login-email&#x27;).value.trim();
    const pw = document.getElementById(&#x27;dc-login-pw&#x27;).value;
    if(!email || !pw){ errEl.style.display=&#x27;block&#x27;; errEl.textContent=&#x27;이메일과 비밀번호를 입력해주세요.&#x27;; return; }
    btn.disabled = true; btn.textContent = &#x27;로그인 중…&#x27;; errEl.style.display=&#x27;none&#x27;;
    const { error } = await sb.auth.signInWithPassword({ email: email, password: pw });
    btn.disabled = false; btn.textContent = &#x27;로그인&#x27;;
    if(error){ errEl.style.display=&#x27;block&#x27;; errEl.textContent=&#x27;로그인 실패: 이메일 또는 비밀번호를 확인해주세요.&#x27;; return; }
    overlay.classList.remove(&#x27;visible&#x27;);
    appEl.style.display = &#x27;block&#x27;;
    overlapAuthChecked = true;
    loadInterviewerSlots();
  }

  btn.addEventListener(&#x27;click&#x27;, attempt);
  document.getElementById(&#x27;dc-login-pw&#x27;).addEventListener(&#x27;keydown&#x27;, function(e){ if(e.key===&#x27;Enter&#x27;) attempt(); });
})();

async function loadInterviewerSlots(){
  try{
    const { data, error } = await window.__sb.from(&#x27;interviewer_slots&#x27;).select(&#x27;*&#x27;).order(&#x27;interviewer_name&#x27;, { ascending: true });
    if(error){ throw error; }
    interviewers = data || [];
    renderHr();
  }catch(e){
    console.error(&#x27;면접관 일정 로드 실패:&#x27;, e);
    interviewers = [];
    renderHr();
  }
}

function setHrView(v){
  currentHrView = v;
  document.querySelectorAll(&#x27;.vtbtn&#x27;).forEach(el=&gt;{
    el.classList.toggle(&#x27;active&#x27;, el.dataset.view === v);
  });
  document.getElementById(&#x27;byperson-chips&#x27;).style.display = (v === &#x27;byperson&#x27;) ? &#x27;flex&#x27; : &#x27;none&#x27;;
  document.getElementById(&#x27;manage-toolbar&#x27;).style.display = (v === &#x27;manage&#x27;) ? &#x27;block&#x27; : &#x27;none&#x27;;
  renderHr();
}

function buildOverlapCounts(){
  const counts = {};
  DAYS.forEach(d=&gt; HOURS.forEach(h=&gt;{
    counts[slotId(d.date,h)] = { count: 0, names: [] };
  }));
  interviewers.forEach(iv=&gt;{
    (iv.available_slots||[]).forEach(sid=&gt;{
      if(counts[sid]){
        counts[sid].count += 1;
        counts[sid].names.push(iv.interviewer_name);
      }
    });
  });
  return counts;
}

function colorForCount(count, max){
  if(count === 0) return &#x27;transparent&#x27;;
  const ratio = max &gt; 0 ? count / max : 0;
  const alpha = 0.12 + ratio * 0.78;
  return `rgba(15,27,46,${alpha.toFixed(2)})`;
}

function renderLegend(maxCount){
  const legend = document.getElementById(&#x27;legend&#x27;);
  if(currentHrView !== &#x27;overlap&#x27;){ legend.innerHTML=&#x27;&#x27;; return; }
  let html = &#x27;&lt;span&gt;가능 인원:&lt;/span&gt;&#x27;;
  const steps = maxCount &lt;= 1 ? [0,1] : [0, Math.ceil(maxCount/2), maxCount];
  [...new Set(steps)].forEach(s=&gt;{
    html += `&lt;span class=&quot;legend-swatch&quot; style=&quot;background:${colorForCount(s, maxCount)};&quot;&gt;&lt;/span&gt;&lt;span&gt;${s}명&lt;/span&gt;`;
  });
  legend.innerHTML = html;
}

function renderOverlapGrid(){
  const counts = buildOverlapCounts();
  const maxCount = Math.max(1, ...Object.values(counts).map(c=&gt;c.count));
  renderLegend(maxCount);

  let html = &#x27;&lt;div class=&quot;hr-grid-scroll&quot;&gt;&lt;div class=&quot;grid&quot;&gt;&#x27;;
  html += `&lt;div class=&quot;gcell ghead&quot;&gt;&lt;/div&gt;`;
  DAYS.forEach(d=&gt;{
    html += `&lt;div class=&quot;gcell ghead&quot;&gt;&lt;span&gt;${d.label}&lt;/span&gt;&lt;span class=&quot;dow&quot;&gt;${d.dow}&lt;/span&gt;&lt;/div&gt;`;
  });
  HOURS.forEach(h=&gt;{
    html += `&lt;div class=&quot;gcell gtime&quot;&gt;${timeLabel(h)}&lt;/div&gt;`;
    DAYS.forEach(d=&gt;{
      const id = slotId(d.date, h);
      const info = counts[id];
      const bg = colorForCount(info.count, maxCount);
      const textColor = info.count / maxCount &gt; 0.5 ? &#x27;#F7F5F0&#x27; : &#x27;var(--ink)&#x27;;
      html += `&lt;div class=&quot;gcell&quot; style=&quot;background:${bg};&quot; title=&quot;${escapeHtml(info.names.join(&#x27;, &#x27;))}&quot;&gt;
        ${info.count &gt; 0 ? `&lt;span class=&quot;gcount&quot; style=&quot;color:${textColor};&quot;&gt;${info.count}&lt;/span&gt;&lt;span class=&quot;gnames&quot; style=&quot;color:${textColor};&quot;&gt;${escapeHtml(info.names.join(&#x27;, &#x27;))}&lt;/span&gt;` : &#x27;&#x27;}
      &lt;/div&gt;`;
    });
  });
  html += &#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
  document.getElementById(&#x27;grid-container&#x27;).innerHTML = html;
}

function renderByPersonChips(){
  const chipsEl = document.getElementById(&#x27;byperson-chips&#x27;);
  if(!activeInterviewer &amp;&amp; interviewers.length){
    activeInterviewer = interviewers[0].interviewer_name;
  }
  chipsEl.innerHTML = interviewers.map(iv=&gt;`
    &lt;div class=&quot;iv-chip ${iv.interviewer_name===activeInterviewer?&#x27;active&#x27;:&#x27;&#x27;}&quot;&gt;
      &lt;span onclick=&quot;selectInterviewer(&#x27;${escapeHtml(iv.interviewer_name)}&#x27;)&quot; style=&quot;cursor:pointer;&quot;&gt;
        ${escapeHtml(iv.interviewer_name)}&lt;span class=&quot;cnt&quot;&gt;${(iv.available_slots||[]).length}개&lt;/span&gt;
      &lt;/span&gt;
      &lt;span class=&quot;iv-chip-delete&quot; onclick=&quot;deleteInterviewerSlot(&#x27;${escapeHtml(iv.interviewer_name)}&#x27;, event)&quot; title=&quot;삭제&quot;&gt;✕&lt;/span&gt;
    &lt;/div&gt;
  `).join(&#x27;&#x27;);
}

async function deleteInterviewerSlot(name, evt){
  if(evt) evt.stopPropagation();
  const ok = confirm(`&#x27;${name}&#x27; 님의 제출 일정을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`);
  if(!ok) return;

  try{
    const { error } = await window.__sb.from(&#x27;interviewer_slots&#x27;).delete().eq(&#x27;interviewer_name&#x27;, name);
    if(error){ throw error; }
    if(activeInterviewer === name) activeInterviewer = null;
    await loadInterviewerSlots();
  }catch(e){
    console.error(&#x27;면접관 일정 삭제 실패:&#x27;, e);
    alert(&#x27;삭제 중 오류가 발생했습니다. 다시 시도해주세요.&#x27;);
  }
}

function selectInterviewer(name){
  activeInterviewer = name;
  renderHr();
}

function renderByPersonGrid(){
  const iv = interviewers.find(x=&gt;x.interviewer_name===activeInterviewer);
  const selectedSet = new Set(iv ? (iv.available_slots||[]) : []);

  let html = &#x27;&lt;div class=&quot;hr-grid-scroll&quot;&gt;&lt;div class=&quot;grid&quot;&gt;&#x27;;
  html += `&lt;div class=&quot;gcell ghead&quot;&gt;&lt;/div&gt;`;
  DAYS.forEach(d=&gt;{
    html += `&lt;div class=&quot;gcell ghead&quot;&gt;&lt;span&gt;${d.label}&lt;/span&gt;&lt;span class=&quot;dow&quot;&gt;${d.dow}&lt;/span&gt;&lt;/div&gt;`;
  });
  HOURS.forEach(h=&gt;{
    html += `&lt;div class=&quot;gcell gtime&quot;&gt;${timeLabel(h)}&lt;/div&gt;`;
    DAYS.forEach(d=&gt;{
      const id = slotId(d.date, h);
      const isSel = selectedSet.has(id);
      html += `&lt;div class=&quot;gcell&quot; style=&quot;background:${isSel ? &#x27;var(--navy)&#x27; : &#x27;transparent&#x27;};&quot;&gt;
        ${isSel ? &#x27;&lt;span style=&quot;color:var(--gold);font-size:15px;&quot;&gt;✓&lt;/span&gt;&#x27; : &#x27;&#x27;}
      &lt;/div&gt;`;
    });
  });
  html += &#x27;&lt;/div&gt;&lt;/div&gt;&#x27;;
  document.getElementById(&#x27;grid-container&#x27;).innerHTML = html;
}

function renderHr(){
  const emptyState = document.getElementById(&#x27;empty-state&#x27;);
  if(interviewers.length === 0){
    emptyState.style.display = &#x27;block&#x27;;
    document.getElementById(&#x27;grid-container&#x27;).innerHTML = &#x27;&#x27;;
    document.getElementById(&#x27;byperson-chips&#x27;).innerHTML = &#x27;&#x27;;
    document.getElementById(&#x27;legend&#x27;).innerHTML = &#x27;&#x27;;
    updateIvBulkDeleteButton();
    return;
  }
  emptyState.style.display = &#x27;none&#x27;;

  if(currentHrView === &#x27;overlap&#x27;){
    renderOverlapGrid();
  } else if(currentHrView === &#x27;byperson&#x27;){
    renderByPersonChips();
    renderByPersonGrid();
  } else if(currentHrView === &#x27;manage&#x27;){
    renderManageList();
  }
}

/* ============ 제출 목록 관리 (체크박스 + 일괄삭제) ============ */
function renderManageList(){
  const validNames = new Set(interviewers.map(iv=&gt;iv.interviewer_name));
  [...selectedInterviewerNames].forEach(n=&gt;{ if(!validNames.has(n)) selectedInterviewerNames.delete(n); });

  const rows = interviewers.map(iv=&gt;{
    const checked = selectedInterviewerNames.has(iv.interviewer_name) ? &#x27;checked&#x27; : &#x27;&#x27;;
    return `
    &lt;div style=&quot;display:flex;align-items:center;gap:12px;padding:12px 14px;border:1.5px solid var(--line);border-radius:9px;background:var(--card);margin-bottom:8px;&quot;&gt;
      &lt;input type=&quot;checkbox&quot; class=&quot;iv-row-checkbox&quot; data-name=&quot;${escapeHtml(iv.interviewer_name)}&quot; ${checked}
        onchange=&quot;toggleInterviewerSelect(&#x27;${escapeHtml(iv.interviewer_name)}&#x27;, this.checked)&quot;&gt;
      &lt;div style=&quot;flex:1;&quot;&gt;
        &lt;div style=&quot;font-weight:700;font-size:14px;color:var(--ink);&quot;&gt;${escapeHtml(iv.interviewer_name)}&lt;/div&gt;
        &lt;div class=&quot;mono&quot; style=&quot;font-size:11.5px;color:var(--slate);margin-top:2px;&quot;&gt;제출 시간 ${(iv.available_slots||[]).length}개&lt;/div&gt;
      &lt;/div&gt;
      &lt;button class=&quot;mini-btn&quot; style=&quot;color:var(--warn);border-color:var(--warn);&quot; onclick=&quot;deleteInterviewerSlot(&#x27;${escapeHtml(iv.interviewer_name)}&#x27;)&quot;&gt;삭제&lt;/button&gt;
    &lt;/div&gt;`;
  }).join(&#x27;&#x27;);

  const selectAllChecked = interviewers.length &gt; 0 &amp;&amp; interviewers.every(iv=&gt;selectedInterviewerNames.has(iv.interviewer_name));
  document.getElementById(&#x27;grid-container&#x27;).innerHTML = `
    &lt;div style=&quot;margin-bottom:10px;display:flex;align-items:center;gap:8px;&quot;&gt;
      &lt;input type=&quot;checkbox&quot; id=&quot;iv-select-all-checkbox&quot; ${selectAllChecked?&#x27;checked&#x27;:&#x27;&#x27;} onchange=&quot;toggleSelectAllInterviewers(this.checked)&quot;&gt;
      &lt;label for=&quot;iv-select-all-checkbox&quot; style=&quot;font-size:12.5px;color:var(--slate);cursor:pointer;&quot;&gt;전체 선택&lt;/label&gt;
    &lt;/div&gt;
    ${rows}
  `;
  updateIvBulkDeleteButton();
}

function toggleInterviewerSelect(name, checked){
  if(checked) selectedInterviewerNames.add(name);
  else selectedInterviewerNames.delete(name);
  updateIvBulkDeleteButton();
  const allEl = document.getElementById(&#x27;iv-select-all-checkbox&#x27;);
  if(allEl){
    allEl.checked = interviewers.length &gt; 0 &amp;&amp; interviewers.every(iv=&gt;selectedInterviewerNames.has(iv.interviewer_name));
  }
}

function toggleSelectAllInterviewers(checked){
  if(checked){
    interviewers.forEach(iv=&gt; selectedInterviewerNames.add(iv.interviewer_name));
  } else {
    selectedInterviewerNames.clear();
  }
  renderManageList();
}

function updateIvBulkDeleteButton(){
  const btn = document.getElementById(&#x27;iv-bulk-delete-btn&#x27;);
  if(!btn) return;
  let countEl = document.getElementById(&#x27;iv-selected-count-num&#x27;);
  if(!countEl){
    btn.innerHTML = &#x27;🗑 선택 삭제 (&lt;span id=&quot;iv-selected-count-num&quot;&gt;0&lt;/span&gt;)&#x27;;
    countEl = document.getElementById(&#x27;iv-selected-count-num&#x27;);
  }
  countEl.textContent = selectedInterviewerNames.size;
  btn.disabled = selectedInterviewerNames.size === 0;
  btn.style.opacity = selectedInterviewerNames.size === 0 ? &#x27;.4&#x27; : &#x27;1&#x27;;
}

async function bulkDeleteInterviewers(){
  if(selectedInterviewerNames.size === 0) return;
  const names = [...selectedInterviewerNames];
  const ok = confirm(`${names.length}명(${names.join(&#x27;, &#x27;)})의 제출 일정을 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.`);
  if(!ok) return;

  const btn = document.getElementById(&#x27;iv-bulk-delete-btn&#x27;);
  btn.disabled = true;
  btn.dataset.originalHtml = btn.innerHTML;
  btn.textContent = &#x27;삭제 중…&#x27;;

  for(const name of names){
    try{
      const { error } = await window.__sb.from(&#x27;interviewer_slots&#x27;).delete().eq(&#x27;interviewer_name&#x27;, name);
      if(error){ console.error(&#x27;삭제 실패:&#x27;, name, error); }
    }catch(e){
      console.error(&#x27;삭제 실패:&#x27;, name, e);
    }
  }

  selectedInterviewerNames.clear();
  await loadInterviewerSlots();
}
&lt;/script&gt;

    <div class="tabm" data-target="schedule"><span class="ticon">🗓️</span>일정취합</div>
    <div class="tabm" data-target="interviewer"><span class="ticon">🗂️</span>면접관</div>

<script>
function hideLoading(id){
  const el = document.getElementById(id);
  if(el) el.classList.add('hidden');
}

function switchTab(target){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+target).classList.add('active');

  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.target===target));
  document.querySelectorAll('.tabm').forEach(t=>t.classList.toggle('active', t.dataset.target===target));
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>switchTab(t.dataset.target));
});
document.querySelectorAll('.tabm').forEach(t=>{
  t.addEventListener('click', ()=>switchTab(t.dataset.target));
});
</script>


<style>
  /* HR 대시보드: #staff 전용 (지원자/면접관에게는 숨김) */
  body:not(.staff-mode) .tab[data-target="hr"],
  body:not(.staff-mode) .tabm[data-target="hr"]{
    display:none !important;
  }
  /* 일정취합 / 면접관 참고화면: #interview 또는 #staff로 접근했을 때 표시 (지원자에게는 숨김) */
  body:not(.interview-mode):not(.staff-mode) .tab[data-target="schedule"],
  body:not(.interview-mode):not(.staff-mode) .tabm[data-target="schedule"],
  body:not(.interview-mode):not(.staff-mode) .tab[data-target="interviewer"],
  body:not(.interview-mode):not(.staff-mode) .tabm[data-target="interviewer"]{
    display:none !important;
  }
</style>
<script>
(function(){
  var STAFF_HASH = "#staff";       // 직원용 링크 (면접관/HR 화면 + 일정취합 모두 표시)
  var INTERVIEW_HASH = "#interview"; // 면접관용 링크 (일정취합 탭만 추가 표시)
  function currentHash(){ return (location.hash || "").toLowerCase(); }
  function isStaff(){ return currentHash() === STAFF_HASH; }
  function isInterview(){ return currentHash() === INTERVIEW_HASH; }

  function applyMode(){
    if(isStaff()){
      document.body.classList.add("staff-mode");
      document.body.classList.remove("interview-mode");
    }else if(isInterview()){
      document.body.classList.remove("staff-mode");
      document.body.classList.add("interview-mode");
      // 면접관 링크(#interview)로는 HR 전용 화면에 들어가 있으면 지원자 탭으로 되돌림.
      // 일정취합/면접관 참고화면은 #interview에서도 허용.
      var activePane = document.querySelector(".pane.active");
      var activeId = activePane ? activePane.id : "";
      if(activeId === "pane-hr"){
        if(typeof switchTab === "function"){ try{ switchTab("applicant"); }catch(e){} }
      }
    }else{
      document.body.classList.remove("staff-mode");
      document.body.classList.remove("interview-mode");
      // 일반 지원자 링크: 면접관 전용(면접관/HR/일정취합) 화면에 있다면 지원자 탭으로 되돌림
      var activePane2 = document.querySelector(".pane.active");
      var activeId2 = activePane2 ? activePane2.id : "";
      if(activeId2 === "pane-interviewer" || activeId2 === "pane-hr" || activeId2 === "pane-schedule"){
        if(typeof switchTab === "function"){ try{ switchTab("applicant"); }catch(e){} }
      }
    }
  }
  // 해시 변경(#staff/#interview 추가·제거) 즉시 반영
  window.addEventListener("hashchange", applyMode);
  document.addEventListener("DOMContentLoaded", applyMode);
  applyMode();
})();
</script>
