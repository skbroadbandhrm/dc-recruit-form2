  /* ===== Top nav ===== */
  .topnav{
    background:var(--navy); color:var(--cream);
    padding:0 20px; flex-shrink:0;
    display:flex; align-items:center; justify-content:space-between;
    height:64px;
  }
  .brand-block{display:flex;align-items:center;gap:12px;}
  .brand-mark{
    width:32px;height:32px;border-radius:7px;background:var(--gold);
    display:flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--navy);font-size:13px;
  }
  .brand-text{display:flex;flex-direction:column;}
  .brand-text .bt-main{font-size:14px;font-weight:700;line-height:1.2;}
  .brand-text .bt-sub{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--gold);letter-spacing:.08em;}

  .tabs{display:flex;gap:4px;}
  .tab{
    padding:10px 18px; border-radius:8px; cursor:pointer;
    font-size:13.5px; font-weight:600; color:#B9C3CF;
    display:flex; align-items:center; gap:7px;
    transition:background .15s, color .15s;
  }
  .tab:hover{background:rgba(255,255,255,0.06);}
  .tab.active{background:var(--gold); color:var(--navy);}
  .tab .ticon{font-size:15px;}

  .nav-right{display:flex;align-items:center;gap:10px;}
  .env-badge{
    font-family:'JetBrains Mono',monospace; font-size:10.5px; color:#B9C3CF;
    border:1px solid rgba(255,255,255,0.2); border-radius:5px; padding:4px 9px;
  }

  /* mobile tab bar (bottom) */
  .tabs-mobile{display:none;}

  /* ===== Content area ===== */
  .content{flex:1; position:relative; overflow:hidden;}
  .pane{
    position:absolute; inset:0; display:none;
  }
  .pane.active{display:block;}
  .pane iframe{
    width:100%; height:100%; border:none; display:block; background:var(--cream);
  }

  /* loading shimmer */
  .pane .loading{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:var(--cream); font-family:'JetBrains Mono',monospace; font-size:12.5px; color:var(--slate);
    transition:opacity .25s;
  }
  .pane .loading.hidden{opacity:0; pointer-events:none;}

  @media (max-width:760px){
    .topnav{height:56px;padding:0 14px;}
    .tabs{display:none;}
    .brand-text .bt-main{font-size:13px;}
    .nav-right .env-badge{display:none;}

    .tabs-mobile{
      display:flex; flex-shrink:0; background:var(--navy);
      border-top:1px solid rgba(255,255,255,0.1);
    }
    .tabm{
      flex:1; text-align:center; padding:10px 4px 12px;
      color:#8A96A4; font-size:11px; font-weight:600; cursor:pointer;
      display:flex; flex-direction:column; align-items:center; gap:3px;
    }
    .tabm .ticon{font-size:18px;}
    .tabm.active{color:var(--gold);}
  }
</style>

&lt;style&gt;

  @import url(&#x27;https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&amp;family=Noto+Sans+KR:wght@400;500;600;700&amp;display=swap&#x27;);

  :root{
    --navy:#0F1B2E;
    --cream:#F7F5F0;
    --slate:#3D5A73;
    --gold:#C9A961;
    --ink:#1A2A3D;
    --line:#D8D2C4;
    --ok:#2F6F4E;
    --warn:#A6432C;
    --card:#FFFFFF;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:&#x27;Noto Sans KR&#x27;, sans-serif;

  /* ===== Shell ===== */
  .app{

    position:relative;
    display:flex;

  }

  /* ===== Header / circuit progress ===== */
  .topbar{
    background:var(--navy);
    color:var(--cream);
    padding:20px 24px 16px;
    position:sticky;
    top:0;
    z-index:30;
  }
  .topbar-row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    margin-bottom:14px;
  }
  .brand{
    font-size:11px;
    letter-spacing:0.12em;
    color:var(--gold);
    font-family:&#x27;JetBrains Mono&#x27;, monospace;
  }
  .stage-label{
    font-size:13px;
    color:#B9C3CF;
    font-family:&#x27;JetBrains Mono&#x27;, monospace;
  }
  /* circuit breaker style progress */
  .circuit{
    display:flex;
    align-items:center;
    gap:0;
    width:100%;
  }
  .node{
    width:9px;height:9px;border-radius:50%;
    background:#2C4054;
    border:1.5px solid #2C4054;
    flex-shrink:0;
    transition:all .35s ease;
    position:relative;
  }
  .node.done{
    background:var(--gold);
    border-color:var(--gold);
    box-shadow:0 0 0 3px rgba(201,169,97,0.18);
  }
  .node.current{
    background:var(--navy);
    border-color:var(--gold);
    width:13px;height:13px;
  }
  .wire{
    flex:1;
    height:2px;
    background:#2C4054;
    margin:0 2px;
    position:relative;
    overflow:hidden;
  }
  .wire .fill{
    position:absolute;left:0;top:0;bottom:0;
    width:0%;
    background:var(--gold);
    transition:width .4s ease;
  }

  /* ===== Body ===== */
  .body{
    flex:1;
    padding:28px 24px 140px;
  }

  .section-tag{
    display:inline-flex;
    align-items:center;
    gap:8px;
    font-family:&#x27;JetBrains Mono&#x27;, monospace;
    font-size:11px;
    letter-spacing:0.08em;

    color:var(--gold);
    font-weight:700;
    margin-bottom:8px;
    display:block;
  }
  .qtitle{
    font-size:19px;
    font-weight:700;
    line-height:1.45;
    color:var(--navy);
    margin:0 0 6px;
  }
  .qhint{
    font-size:13px;
    color:var(--slate);
    line-height:1.5;
    margin:0 0 22px;
  }
  .qhint .var{
    background:rgba(201,169,97,0.18);
    padding:1px 6px;
    border-radius:3px;
    font-weight:600;
    color:var(--navy);

    animation:rise .35s ease;

  .screen.active{display:block;}
  @keyframes rise{
    from{opacity:0;transform:translateY(10px);}
    to{opacity:1;transform:translateY(0);}
  }

  /* choice options */
  .choices{display:flex;flex-direction:column;gap:10px;}
  .choice{
    border:1.5px solid var(--line);
    background:var(--card);
    border-radius:10px;
    padding:15px 16px;
    display:flex;
    align-items:flex-start;
    gap:12px;
    cursor:pointer;
    transition:border-color .15s, background .15s;
  }
  .choice:hover{border-color:var(--slate);}
  .choice.selected{
    border-color:var(--navy);
    background:#EFEAE0;
  }
  .choice .letter{
    font-family:&#x27;JetBrains Mono&#x27;, monospace;
    font-weight:700;
    font-size:12px;
    color:var(--cream);
    background:var(--slate);
    width:22px;height:22px;
    border-radius:5px;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    margin-top:1px;

  .choice.selected .letter{background:var(--navy);}

    user-select:none;

  .rankitem .ranknum{

    font-weight:700;font-size:13px;color:var(--gold);

  textarea, input[type=text]{
    width:100%;
    border:1.5px solid var(--line);
    background:var(--card);
    border-radius:10px;
    padding:14px;
    font-family:&#x27;Noto Sans KR&#x27;, sans-serif;
    font-size:15px;
    color:var(--ink);
    resize:none;
    line-height:1.5;
  }
  textarea:focus, input[type=text]:focus{
    outline:none;
    border-color:var(--navy);
  }
  .counter{
    text-align:right;
    font-family:&#x27;JetBrains Mono&#x27;, monospace;
    font-size:11.5px;
    color:var(--slate);
    margin-top:6px;
  }
  .counter.over{color:var(--warn);font-weight:700;}

  /* footer nav */
  .footer{
    position:fixed;
    bottom:0;left:0;right:0;
    max-width:640px;
    margin:0 auto;
    background:var(--cream);

    padding:14px 24px 20px;
    display:flex;
    gap:10px;
    z-index:20;
  }
  .btn{
    flex:1;
    border:none;
    border-radius:10px;
    padding:15px;
    font-family:&#x27;Noto Sans KR&#x27;, sans-serif;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition:opacity .15s, transform .1s;
  }
  .btn:active{transform:scale(0.985);}
  .btn-prev{
    flex:0 0 88px;
    background:transparent;
    border:1.5px solid var(--line);
    color:var(--slate);
  }
  .btn-next{
    background:var(--navy);
    color:var(--cream);
  }
  .btn-next:disabled{opacity:0.35;cursor:not-allowed;}
  .btn-next .arrow{font-family:&#x27;JetBrains Mono&#x27;,monospace;margin-left:6px;}

  /* ===== Intro screen ===== */
  .intro{padding:40px 24px 24px;}
  .intro-eyebrow{
    font-family:&#x27;JetBrains Mono&#x27;, monospace;

    overflow:hidden;

  .meta-cell{background:var(--card);padding:14px 16px;}
  .meta-cell .mlabel{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:10.5px;color:var(--slate);letter-spacing:.06em;margin-bottom:4px;}
  .meta-cell .mval{font-size:15px;font-weight:700;color:var(--navy);}
  .notice{
    background:rgba(61,90,115,0.07);
    border-left:3px solid var(--slate);
    padding:13px 14px;
    border-radius:6px;
    font-size:13px;
    line-height:1.6;
    color:var(--ink);
    margin-bottom:28px;
  }
  .start-btn{
    width:100%;background:var(--navy);color:var(--cream);
    border:none;border-radius:10px;padding:17px;
    font-size:16px;font-weight:700;cursor:pointer;
  }

  /* ===== Schedule screen ===== */
  .slot{
    border:1.5px solid var(--line);
    background:var(--card);
    border-radius:10px;
    padding:16px;
    margin-bottom:10px;
    cursor:pointer;
    display:flex;justify-content:space-between;align-items:center;
  }
  .slot.selected{border-color:var(--navy);background:#EFEAE0;}
  .slot .sdate{font-size:15px;font-weight:700;color:var(--navy);}
  .slot .stime{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:13px;color:var(--slate);margin-top:3px;}
  .slot .savail{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:10.5px;color:var(--ok);background:rgba(47,111,78,0.1);padding:3px 8px;border-radius:4px;}
  .slot .savail.few{color:var(--warn);background:rgba(166,67,44,0.1);}

  /* ===== Done screen ===== */
  .done-wrap{padding:60px 24px;text-align:center;}
  .done-icon{
    width:56px;height:56px;border-radius:50%;
    background:var(--navy);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 24px;
  }
  .done-icon svg{width:26px;height:26px;}
  .done-wrap h2{font-size:21px;color:var(--navy);margin:0 0 10px;}
  .done-wrap p{font-size:14px;color:var(--slate);line-height:1.7;margin:0 0 28px;}

    background:var(--card);

    border-radius:10px;
    padding:18px;
    text-align:left;
    margin-bottom:24px;

    display:flex;justify-content:space-between;

  .summary-row .slabel{color:var(--slate);}

    .body{padding:24px 18px 140px;}

  .attend-deadline{
    background:rgba(166,67,44,0.08); border:1px solid rgba(166,67,44,0.25); border-radius:10px;

  .attend-choices{display:flex;gap:10px;margin-bottom:16px;}
  .attend-choices .choice{flex:1;justify-content:center;text-align:center;}
  .alt-time-block{margin-top:6px;}
  .alt-time-note{
    font-size:12.5px; color:var(--slate); line-height:1.6; margin-bottom:10px;
    background:rgba(61,90,115,0.06); border-radius:8px; padding:10px 12px;
  }

let selectedPosition = null;

function selectPosition(pos){
  selectedPosition = pos;
  document.querySelectorAll(&#x27;.pos-card&#x27;).forEach(el=&gt;{
    el.classList.toggle(&#x27;selected&#x27;, el.dataset.pos === pos);
  });
}

/* ============ STATE ============ */
let step = 0; // 0 = intro
const TOTAL_STEPS = 12; // 1~6 expertise, 7~10 work style, 11 schedule, 12 confirm
const answers = {};

function startFlow(){
  const name = document.getElementById(&#x27;applicant-name&#x27;).value.trim();
  const email = document.getElementById(&#x27;applicant-email&#x27;).value.trim();
  const err = document.getElementById(&#x27;intro-error&#x27;);
  if(!name || !email || !selectedPosition){
    err.style.display = &#x27;block&#x27;;
    return;
  }
  err.style.display = &#x27;none&#x27;;
  answers.applicantName = name;
  answers.applicantEmail = email;
  answers.position = selectedPosition;
  renderExpertiseScreens(selectedPosition);
  document.getElementById(&#x27;topbar-brand&#x27;).textContent = `DC·${selectedPosition} PRE-SCREEN`;
  goTo(1);
}

/* ============ RENDER EXPERTISE SCREENS (Q1~Q6, position-specific) ============ */
function escapeAttr(s){
  return (s||&#x27;&#x27;).replace(/&quot;/g,&#x27;&amp;quot;&#x27;);
}

function renderExpertiseScreens(pos){
  const def = POSITIONS[pos];
  const wrap = document.getElementById(&#x27;expertise-screens&#x27;);
  let html = &#x27;&#x27;;
  def.questions.forEach((q, idx)=&gt;{
    const stepNum = idx + 1;
    html += `&lt;div class=&quot;screen&quot; data-step=&quot;${stepNum}&quot;&gt;`;
    html += `&lt;span class=&quot;section-tag&quot;&gt;&lt;span class=&quot;dot&quot;&gt;&lt;/span&gt;JOB EXPERTISE · 0${stepNum}&lt;/span&gt;`;
    html += `&lt;span class=&quot;qnum&quot;&gt;${q.qnum}&lt;/span&gt;`;
    if(q.type !== &#x27;multi&#x27; &amp;&amp; q.type !== &#x27;single&#x27;){
      html += `&lt;h2 class=&quot;qtitle&quot;&gt;${q.title}&lt;/h2&gt;`;
    } else {
      // single/multi: title shown as hint-style heading above choices for consistency
      html += `&lt;h2 class=&quot;qtitle&quot;&gt;${q.title}&lt;/h2&gt;`;
    }
    if(q.hint){
      html += `&lt;p class=&quot;qhint&quot;&gt;${q.hint}&lt;/p&gt;`;
    }
    if(q.hintEchoProject){
      html += `&lt;p class=&quot;qhint&quot;&gt;대상 프로젝트: &lt;span class=&quot;var&quot; id=&quot;proj-echo-${q.id}&quot;&gt;—&lt;/span&gt;&lt;/p&gt;`;
    }

    if(q.type === &#x27;text&#x27;){
      html += `&lt;input type=&quot;text&quot; id=&quot;exp-${q.id}-input&quot; maxlength=&quot;${q.maxlength||40}&quot; placeholder=&quot;${escapeAttr(q.placeholder||&#x27;&#x27;)}&quot;&gt;`;
    } else if(q.type === &#x27;textarea&#x27;){
      html += `&lt;textarea id=&quot;exp-${q.id}-input&quot; rows=&quot;4&quot; maxlength=&quot;${q.maxlength||120}&quot; placeholder=&quot;${escapeAttr(q.placeholder||&#x27;&#x27;)}&quot;&gt;&lt;/textarea&gt;`;
      html += `&lt;div class=&quot;counter&quot; id=&quot;exp-${q.id}-counter&quot;&gt;0 / ${q.recommended||80}자 권장&lt;/div&gt;`;
    } else if(q.type === &#x27;multi&#x27;){
      html += `&lt;div class=&quot;choices&quot; id=&quot;exp-${q.id}-choices&quot;&gt;`;
      q.options.forEach(o=&gt;{
        html += `&lt;div class=&quot;choice multi&quot; data-val=&quot;${o.val}&quot;&gt;&lt;span class=&quot;check&quot;&gt;&lt;svg viewBox=&quot;0 0 16 16&quot; fill=&quot;none&quot;&gt;&lt;path d=&quot;M3 8l3.5 3.5L13 4.5&quot; stroke=&quot;white&quot; stroke-width=&quot;2.2&quot; stroke-linecap=&quot;round&quot; stroke-linejoin=&quot;round&quot;/&gt;&lt;/svg&gt;&lt;/span&gt;&lt;span class=&quot;ctext&quot;&gt;${o.label}&lt;/span&gt;&lt;/div&gt;`;
      });
      html += `&lt;/div&gt;`;
    } else if(q.type === &#x27;single&#x27;){
      html += `&lt;div class=&quot;choices&quot; id=&quot;exp-${q.id}-choices&quot;&gt;`;
      q.options.forEach(o=&gt;{
        html += `&lt;div class=&quot;choice&quot; data-val=&quot;${o.val}&quot;&gt;&lt;span class=&quot;letter&quot;&gt;${o.val}&lt;/span&gt;&lt;span class=&quot;ctext&quot;&gt;${o.label}&lt;/span&gt;&lt;/div&gt;`;
      });
      html += `&lt;/div&gt;`;
    }
    html += `&lt;/div&gt;`;
  });
  wrap.innerHTML = html;

  // wire up events for the newly rendered screens
  def.questions.forEach((q)=&gt;{
    if(q.type === &#x27;text&#x27;){
      const el = document.getElementById(`exp-${q.id}-input`);
      el.addEventListener(&#x27;input&#x27;, ()=&gt;{
        answers[`exp-${q.id}`] = el.value;
        // echo into any textarea hints referencing project name
        const display = el.value.trim().length ? el.value.trim() : &#x27;—&#x27;;
        def.questions.forEach(q2=&gt;{
          if(q2.hintEchoProject){
            const echoEl = document.getElementById(`proj-echo-${q2.id}`);
            if(echoEl) echoEl.textContent = display;
          }
        });
        updateNextEnabled();
      });
    } else if(q.type === &#x27;textarea&#x27;){
      const el = document.getElementById(`exp-${q.id}-input`);
      const counter = document.getElementById(`exp-${q.id}-counter`);
      el.addEventListener(&#x27;input&#x27;, ()=&gt;{
        const len = el.value.length;
        if(counter){
          counter.textContent = `${len} / ${q.recommended||80}자 권장`;
          counter.classList.toggle(&#x27;over&#x27;, len &gt; (q.recommended||80));
        }
        answers[`exp-${q.id}`] = el.value;
        updateNextEnabled();
      });
    } else if(q.type === &#x27;multi&#x27;){
      const wrapEl = document.getElementById(`exp-${q.id}-choices`);
      wrapEl.addEventListener(&#x27;click&#x27;, (e)=&gt;{
        const item = e.target.closest(&#x27;.choice&#x27;);
        if(!item) return;
        item.classList.toggle(&#x27;selected&#x27;);
        const selected = [...wrapEl.querySelectorAll(&#x27;.choice.selected&#x27;)].map(el=&gt;el.dataset.val);
        answers[`exp-${q.id}`] = selected;
        updateNextEnabled();
      });
    } else if(q.type === &#x27;single&#x27;){
      const wrapEl = document.getElementById(`exp-${q.id}-choices`);
      wrapEl.addEventListener(&#x27;click&#x27;, (e)=&gt;{
        const item = e.target.closest(&#x27;.choice&#x27;);
        if(!item) return;
        wrapEl.querySelectorAll(&#x27;.choice&#x27;).forEach(el=&gt;el.classList.remove(&#x27;selected&#x27;));
        item.classList.add(&#x27;selected&#x27;);
        answers[`exp-${q.id}`] = item.dataset.val;
        updateNextEnabled();
      });
    }
  });
}

/* ============ ATTEND YES/NO ============ */
document.getElementById(&#x27;attend-yes&#x27;).addEventListener(&#x27;click&#x27;, ()=&gt;{ setAttend(true); });
document.getElementById(&#x27;attend-no&#x27;).addEventListener(&#x27;click&#x27;, ()=&gt;{ setAttend(false); });

function setAttend(canAttend){
  answers.cannotAttend = !canAttend;
  document.getElementById(&#x27;attend-yes&#x27;).classList.toggle(&#x27;selected&#x27;, canAttend);
  document.getElementById(&#x27;attend-no&#x27;).classList.toggle(&#x27;selected&#x27;, !canAttend);
  const altBlock = document.getElementById(&#x27;alt-time-block&#x27;);
  altBlock.style.display = canAttend ? &#x27;none&#x27; : &#x27;block&#x27;;
  if(canAttend){
    answers.altTimeRequest = &#x27;&#x27;;
    document.getElementById(&#x27;alt-time-input&#x27;).value = &#x27;&#x27;;
  }
  updateNextEnabled();
}

document.getElementById(&#x27;alt-time-input&#x27;).addEventListener(&#x27;input&#x27;, (e)=&gt;{
  answers.altTimeRequest = e.target.value;
  updateNextEnabled();
});

/* ============ CIRCUIT PROGRESS (steps 1-10) ============ */
function renderCircuit(){
  const c = document.getElementById(&#x27;circuit&#x27;);
  let html = &#x27;&#x27;;
  for(let i=1;i&lt;=10;i++){
    const cls = i &lt; step ? &#x27;done&#x27; : (i === step ? &#x27;current&#x27; : &#x27;&#x27;);
    html += `&lt;div class=&quot;node ${cls}&quot;&gt;&lt;/div&gt;`;
    if(i&lt;10){
      const fillPct = i &lt; step ? 100 : 0;
      html += `&lt;div class=&quot;wire&quot;&gt;&lt;div class=&quot;fill&quot; style=&quot;width:${fillPct}%&quot;&gt;&lt;/div&gt;&lt;/div&gt;`;
    }
  }
  c.innerHTML = html;
}

function updateStageLabel(){
  const label = document.getElementById(&#x27;stage-label&#x27;);
  if(step&gt;=1 &amp;&amp; step&lt;=6) label.textContent = `SECTION 1 / 직무전문성 · ${step}/6`;
  else if(step&gt;=7 &amp;&amp; step&lt;=10) label.textContent = `SECTION 2 / 일하는 방식 · ${step-6}/4`;
  else if(step===11) label.textContent = `면접 일정 확인`;
  else if(step===12) label.textContent = `제출 완료`;
}

/* ============ NAV ============ */
function goTo(n){
  step = n;
  document.querySelectorAll(&#x27;.screen&#x27;).forEach(s=&gt;s.classList.remove(&#x27;active&#x27;));

  if(n===0){
    document.getElementById(&#x27;screen-intro&#x27;).classList.add(&#x27;active&#x27;);
    document.getElementById(&#x27;topbar&#x27;).style.display=&#x27;none&#x27;;
    document.getElementById(&#x27;footer&#x27;).style.display=&#x27;none&#x27;;
    return;
  }

  const target = document.querySelector(`.screen[data-step=&quot;${n}&quot;]`);
  if(target) target.classList.add(&#x27;active&#x27;);

  document.getElementById(&#x27;topbar&#x27;).style.display = (n&lt;=11) ? &#x27;block&#x27; : &#x27;none&#x27;;
  document.getElementById(&#x27;footer&#x27;).style.display = &#x27;flex&#x27;;

  if(n&lt;=10){ renderCircuit(); }
  updateStageLabel();

  const prevBtn = document.querySelector(&#x27;.btn-prev&#x27;);
  prevBtn.style.visibility = (n===1) ? &#x27;hidden&#x27; : &#x27;visible&#x27;;

  const nextBtn = document.getElementById(&#x27;next-btn&#x27;);
  if(n===11){ nextBtn.innerHTML = &#x27;제출하기&lt;span class=&quot;arrow&quot;&gt;→&lt;/span&gt;&#x27;; }
  else if(n===12){ document.getElementById(&#x27;footer&#x27;).style.display=&#x27;none&#x27;; }
  else { nextBtn.innerHTML = &#x27;다음&lt;span class=&quot;arrow&quot;&gt;→&lt;/span&gt;&#x27;; }

  updateNextEnabled();
  window.scrollTo(0,0);
}

/* ============ LABEL MAPS (work-style + leadership, shared across positions) ============ */
const LABELS = {
  q10: {A:&#x27;방향만 주고 방법은 맡기는 리더&#x27;, B:&#x27;주기적으로 체크인하는 리더&#x27;, C:&#x27;세부진행까지 챙기는 리더&#x27;},
  q8rank: {speed:&#x27;빠른 의사결정&#x27;, review:&#x27;꼼꼼한 사전검토&#x27;, relation:&#x27;현장 협의체와의 관계&#x27;, report:&#x27;본사 보고체계 준수&#x27;}
};

function buildExpertiseRecord(){
  const pos = answers.position;
  const def = POSITIONS[pos];
  const expertise = {};
  def.questions.forEach(q=&gt;{
    const raw = answers[`exp-${q.id}`];
    let value;
    if(q.type === &#x27;multi&#x27;){
      value = (raw||[]).map(v=&gt;{
        const opt = q.options.find(o=&gt;o.val===v);
        return opt ? opt.label : v;
      });
    } else if(q.type === &#x27;single&#x27;){
      const opt = (q.options||[]).find(o=&gt;o.val===raw);
      value = opt ? opt.label : (raw||&#x27;&#x27;);
    } else {
      value = raw || &#x27;&#x27;;
    }
    expertise[q.id] = { qnum: q.qnum, title: q.title, value: value, type: q.type };
  });
  return expertise;
}

/* 레거시 호환: 전기직무는 기존 면접관/HR 화면에서 쓰던 필드명을 그대로 같이 채워준다. */
function buildLegacyElectricalFields(expertise){
  const get = (id)=&gt; expertise[id] ? expertise[id].value : &#x27;&#x27;;
  return {
    project: get(&#x27;q1&#x27;) || &#x27;&#x27;,
    decisionBoundary: get(&#x27;q2&#x27;) || &#x27;&#x27;,
    techIssue: get(&#x27;q3&#x27;) || &#x27;&#x27;,
    phasesInvolved: Array.isArray(get(&#x27;q4&#x27;)) ? get(&#x27;q4&#x27;) : [],
    scenarioMaintenance: get(&#x27;q5&#x27;) || &#x27;&#x27;,
    scenarioVendorConflict: get(&#x27;q6&#x27;) || &#x27;&#x27;,
  };
}

function buildSubmissionRecord(){
  const cannotAttend = !!answers.cannotAttend;
  const expertise = buildExpertiseRecord();
  const pos = answers.position;

  const record = {
    candidateName: answers.applicantName || &#x27;&#x27;,
    candidateEmail: answers.applicantEmail || &#x27;&#x27;,
    submittedAt: new Date().toISOString(),
    position: pos,
    expertise: expertise,
    leadershipPref: LABELS.q10[answers.q10] || &#x27;&#x27;,
    relocationConsideration: answers[&#x27;q7-input&#x27;] || &#x27;&#x27;,
    turnoverReason: answers[&#x27;q-turnover-input&#x27;] || &#x27;&#x27;,
    priorityRank: (answers.q8||[]).map(v=&gt;LABELS.q8rank[v]||v),
    cannotAttend: cannotAttend,
    altTimeRequest: cannotAttend ? (answers.altTimeRequest || &#x27;&#x27;) : &#x27;&#x27;,
    interviewSlot: cannotAttend ? `제시된 시간 참여 불가 (요청: ${answers.altTimeRequest || &#x27;미작성&#x27;})` : &#x27;안내받은 시간 참여 가능&#x27;,
    status: &#x27;사전질문 제출완료&#x27;
  };

  if(pos === &#x27;전기&#x27;){
    Object.assign(record, buildLegacyElectricalFields(expertise));
  }

  return record;
}

async function saveSubmissionToStorage(record){
  try{
    const key = `${STORAGE_PREFIX}:${record.candidateEmail || record.candidateName}`;
    await window.storage.set(key, JSON.stringify(record), true); // shared=true: 면접관/HR과 공유
  }catch(e){
    console.error(&#x27;storage 저장 실패 (면접관/HR 화면과 별도로, 메일은 정상 발송됩니다):&#x27;, e);
  }
}

function buildEmailSubjectAndBody(record){
  const subject = `[DC${record.position}직무 사전인터뷰 제출] ${record.candidateName}`;
  const bodyLines = [
    `지원자: ${record.candidateName} (${record.candidateEmail})`,
    `제출시각: ${new Date(record.submittedAt).toLocaleString(&#x27;ko-KR&#x27;)}`,
    `지원직무: ${record.position}`,
    ``,
    `[1차 면접 참여 가능 여부] ${record.cannotAttend ? &#x27;참여 불가&#x27; : &#x27;참여 가능&#x27;}`,
  ];
  if(record.cannotAttend){
    bodyLines.push(`[별도 요청 일정] ${record.altTimeRequest || &#x27;미작성&#x27;}`);
  }
  bodyLines.push(``, `--- 직무전문성 (${record.position}) ---`);
  Object.keys(record.expertise).forEach(qid=&gt;{
    const q = record.expertise[qid];
    const val = Array.isArray(q.value) ? q.value.join(&#x27;, &#x27;) : q.value;
    bodyLines.push(`${q.qnum}. ${q.title}: ${val}`);
  });
  bodyLines.push(
    ``,
    `--- 일하는 방식 ---`,
    `Q7. 지역근무 우선고려사항: ${record.relocationConsideration}`,
    `Q8. 현장 우선순위: ${record.priorityRank.join(&#x27; &gt; &#x27;)}`,
    `Q9. 이직 희망사유: ${record.turnoverReason}`,
    `Q10. 선호 리더십 스타일: ${record.leadershipPref}`,
  );
  return { subject, body: bodyLines.join(&#x27;\n&#x27;) };
}

function buildMailtoLink(record){
  const {subject, body} = buildEmailSubjectAndBody(record);
  const to = HR_EMAILS.join(&#x27;,&#x27;);
  return `mailto:${to}?subject=${encodeURIComponent(subject)}&amp;body=${encodeURIComponent(body)}`;
}

function buildGmailLink(record){
  const {subject, body} = buildEmailSubjectAndBody(record);
  const to = HR_EMAILS.join(&#x27;,&#x27;);
  return `https://mail.google.com/mail/?view=cm&amp;fs=1&amp;to=${encodeURIComponent(to)}&amp;su=${encodeURIComponent(subject)}&amp;body=${encodeURIComponent(body)}`;
}

function nextStep(){
  if(step===12) return;
  if(step===11){
    // finalize
    const record = buildSubmissionRecord();
    document.getElementById(&#x27;confirm-time&#x27;).textContent = new Date().toLocaleString(&#x27;ko-KR&#x27;);

    saveSubmissionToStorage(record); // 면접관/HR 대시보드용 (실패해도 메일 발송엔 영향 없음)
    document.getElementById(&#x27;mailto-link&#x27;).setAttribute(&#x27;href&#x27;, buildMailtoLink(record));
    document.getElementById(&#x27;gmail-link&#x27;).setAttribute(&#x27;href&#x27;, buildGmailLink(record));

    goTo(12);
    return;
  }
  goTo(step+1);
}
function prevStep(){
  if(step&lt;=1) return;
  goTo(step-1);
}

/* ============ INPUT WIRING (work-style, fixed across positions) ============ */
function wireTextarea(id, counterId, max, recommended){
  const el = document.getElementById(id);
  const counter = document.getElementById(counterId);
  el.addEventListener(&#x27;input&#x27;, ()=&gt;{
    const len = el.value.length;
    counter.textContent = `${len} / ${recommended}자 권장`;
    counter.classList.toggle(&#x27;over&#x27;, len &gt; recommended);
    answers[id] = el.value;
    updateNextEnabled();
  });
}
wireTextarea(&#x27;q7-input&#x27;,&#x27;q7-counter&#x27;,80,50);
wireTextarea(&#x27;q-turnover-input&#x27;,&#x27;q-turnover-counter&#x27;,80,50);

// Q10 single-select (leadership style)
document.getElementById(&#x27;q10-choices&#x27;).addEventListener(&#x27;click&#x27;, (e)=&gt;{
  const item = e.target.closest(&#x27;.choice&#x27;);
  if(!item) return;
  document.querySelectorAll(&#x27;#q10-choices .choice&#x27;).forEach(el=&gt;el.classList.remove(&#x27;selected&#x27;));
  item.classList.add(&#x27;selected&#x27;);
  answers.q10 = item.dataset.val;
  updateNextEnabled();
});

// Q8 drag-to-rank
const ranklist = document.getElementById(&#x27;ranklist&#x27;);
let dragEl = null;
ranklist.addEventListener(&#x27;dragstart&#x27;, (e)=&gt;{
  dragEl = e.target.closest(&#x27;.rankitem&#x27;);
  dragEl.classList.add(&#x27;dragging&#x27;);
});
ranklist.addEventListener(&#x27;dragend&#x27;, ()=&gt;{
  if(dragEl) dragEl.classList.remove(&#x27;dragging&#x27;);
  dragEl = null;
  renumberRanks();
});
ranklist.addEventListener(&#x27;dragover&#x27;, (e)=&gt;{
  e.preventDefault();
  const after = [...ranklist.querySelectorAll(&#x27;.rankitem:not(.dragging)&#x27;)].find(el=&gt;{
    const r = el.getBoundingClientRect();
    return e.clientY &lt; r.top + r.height/2;
  });
  if(after) ranklist.insertBefore(dragEl, after);
  else ranklist.appendChild(dragEl);
});
function renumberRanks(){
  [...ranklist.querySelectorAll(&#x27;.rankitem&#x27;)].forEach((el,i)=&gt;{
    el.querySelector(&#x27;.ranknum&#x27;).textContent = i+1;
  });
  answers.q8 = [...ranklist.querySelectorAll(&#x27;.rankitem&#x27;)].map(el=&gt;el.dataset.val);
}
renumberRanks();
// touch support (simple)
let touchY=0, touchItem=null;
ranklist.addEventListener(&#x27;touchstart&#x27;, (e)=&gt;{
  touchItem = e.target.closest(&#x27;.rankitem&#x27;);
  if(touchItem) touchItem.classList.add(&#x27;dragging&#x27;);
},{passive:true});
ranklist.addEventListener(&#x27;touchmove&#x27;, (e)=&gt;{
  if(!touchItem) return;
  const touch = e.touches[0];
  const after = [...ranklist.querySelectorAll(&#x27;.rankitem:not(.dragging)&#x27;)].find(el=&gt;{
    const r = el.getBoundingClientRect();
    return touch.clientY &lt; r.top + r.height/2;
  });
  if(after) ranklist.insertBefore(touchItem, after);
  else ranklist.appendChild(touchItem);
},{passive:true});
ranklist.addEventListener(&#x27;touchend&#x27;, ()=&gt;{
  if(touchItem) touchItem.classList.remove(&#x27;dragging&#x27;);
  touchItem=null;
  renumberRanks();
});

/* ============ VALIDATION ============ */
function isExpertiseStepValid(stepNum){
  const pos = answers.position;
  if(!pos) return false;
  const def = POSITIONS[pos];
  const q = def.questions[stepNum-1];
  if(!q) return true;
  const raw = answers[`exp-${q.id}`];
  if(q.type === &#x27;text&#x27; || q.type === &#x27;textarea&#x27;){
    return (raw||&#x27;&#x27;).trim().length &gt; 0;
  } else if(q.type === &#x27;multi&#x27;){
    return (raw||[]).length &gt; 0;
  } else if(q.type === &#x27;single&#x27;){
    return !!raw;
  }
  return true;
}

function updateNextEnabled(){
  const nextBtn = document.getElementById(&#x27;next-btn&#x27;);
  let ok = true;
  if(step&gt;=1 &amp;&amp; step&lt;=6){
    ok = isExpertiseStepValid(step);
  } else {
    switch(step){
      case 7: ok = (answers[&#x27;q7-input&#x27;]||&#x27;&#x27;).trim().length&gt;0; break;
      case 8: ok = true; break; // ranking always has a value
      case 9: ok = (answers[&#x27;q-turnover-input&#x27;]||&#x27;&#x27;).trim().length&gt;0; break;
      case 10: ok = !!answers.q10; break;
      case 11:
        if(answers.cannotAttend === undefined){ ok = false; }
        else if(answers.cannotAttend){ ok = (answers.altTimeRequest||&#x27;&#x27;).trim().length&gt;0; }
        else { ok = true; }
        break;
      default: ok = true;
    }
  }
  nextBtn.disabled = !ok;
}

    &lt;label&gt;비밀번호&lt;/label&gt;
    &lt;input type=&quot;password&quot; id=&quot;dc-login-pw&quot; placeholder=&quot;••••••••&quot; autocomplete=&quot;current-password&quot;&gt;
    &lt;div id=&quot;dc-login-err&quot;&gt;&lt;/div&gt;

&lt;script&gt;
(function(){
  const sb = window.__sb;
  const overlay = document.getElementById(&#x27;dc-login-overlay&#x27;);
  const bar = document.getElementById(&#x27;dc-logout-bar&#x27;);
  const btn = document.getElementById(&#x27;dc-login-btn&#x27;);
  const errEl = document.getElementById(&#x27;dc-login-err&#x27;);
  document.body.classList.add(&#x27;dc-locked&#x27;);

  function unlock(){
    overlay.style.display=&#x27;none&#x27;;
    bar.style.display=&#x27;block&#x27;;
    document.body.classList.remove(&#x27;dc-locked&#x27;);
    // existing page code calls loadCandidates() on load; call again now that we&#x27;re authed
    if(typeof window.loadCandidates === &#x27;function&#x27;){ try{ window.loadCandidates(); }catch(e){} }
  }

  async function attempt(){
    const email = document.getElementById(&#x27;dc-login-email&#x27;).value.trim();
    const pw = document.getElementById(&#x27;dc-login-pw&#x27;).value;
    if(!email || !pw){ errEl.style.display=&#x27;block&#x27;; errEl.textContent=&#x27;이메일과 비밀번호를 입력해주세요.&#x27;; return; }
    btn.disabled = true; btn.textContent = &#x27;로그인 중…&#x27;; errEl.style.display=&#x27;none&#x27;;
    const { error } = await sb.auth.signInWithPassword({ email: email, password: pw });
    btn.disabled = false; btn.textContent = &#x27;로그인&#x27;;
    if(error){ errEl.style.display=&#x27;block&#x27;; errEl.textContent=&#x27;로그인 실패: 이메일 또는 비밀번호를 확인해주세요.&#x27;; return; }
    unlock();
  }

  btn.addEventListener(&#x27;click&#x27;, attempt);
  document.getElementById(&#x27;dc-login-pw&#x27;).addEventListener(&#x27;keydown&#x27;, function(e){ if(e.key===&#x27;Enter&#x27;) attempt(); });
  document.getElementById(&#x27;dc-logout-btn&#x27;).addEventListener(&#x27;click&#x27;, async function(){
    await sb.auth.signOut();
    location.reload();
  });

  // already logged in? (session persists per browser)
  sb.auth.getSession().then(function(res){
    if(res &amp;&amp; res.data &amp;&amp; res.data.session){ unlock(); }
  });
})();
&lt;/script&gt;

&lt;script&gt;
(function(){
  const PREFIX = &quot;dc_prescreen:&quot;;
  const _sb = window.__sb;       // shared supabase client (set after login/init)
  let _cache = {};               // key -&gt; last fetched row (for list+get pairing)

  function stripPrefix(key){ return (key||&#x27;&#x27;).indexOf(PREFIX)===0 ? key.slice(PREFIX.length) : key; }
  function recordToValue(row){
    // reconstruct the JSON string the existing code expects
    const rec = Object.assign({}, row.data || {});
    rec.status = row.status || rec.status || &#x27;사전질문 제출완료&#x27;;
    if(row.exec_interview_slot) rec.execInterviewSlot = row.exec_interview_slot;
    rec._key = PREFIX + row.email;
    return JSON.stringify(rec);
  }

  window.storage = {
    
      get: async function(key){
        const email = stripPrefix(key);
        const { data, error } = await _sb.from(&#x27;candidates&#x27;).select(&#x27;*&#x27;).eq(&#x27;email&#x27;, email).maybeSingle();
        if(error || !data) return null;
        return { key: key, value: recordToValue(data), shared: true };
      },
      list: async function(prefix){
        const { data, error } = await _sb.from(&#x27;candidates&#x27;).select(&#x27;*&#x27;).order(&#x27;submitted_at&#x27;, { ascending:false });
        if(error || !data) return { keys: [], prefix: prefix, shared: true };
        _cache = {};
        const keys = data.map(function(row){
          const k = PREFIX + row.email;
          _cache[k] = row;
          return k;
        });
        return { keys: keys, prefix: prefix, shared: true };
      },
    
    set: async function(key, value){
      const email = stripPrefix(key);
      let rec;
      try { rec = JSON.parse(value); } catch(e){ rec = {}; }
      const status = rec.status || &#x27;사전질문 제출완료&#x27;;
      const execSlot = rec.execInterviewSlot || &#x27;&#x27;;
      // strip columns we store separately so they don&#x27;t duplicate inside data
      const dataCopy = Object.assign({}, rec);
      delete dataCopy._key;
      const payload = {
        email: email,
        data: dataCopy,
        status: status,
        exec_interview_slot: execSlot,
        updated_at: new Date().toISOString()
      };
      // upsert on email (insert or overwrite same applicant)
      const { error } = await _sb.from(&#x27;candidates&#x27;).upsert(payload, { onConflict: &#x27;email&#x27; });
      if(error){ console.error(&#x27;Supabase set 실패:&#x27;, error); throw error; }
      return { key: key, value: value, shared: true };
    },
    delete: async function(key){
      const email = stripPrefix(key);
      const { error } = await _sb.from(&#x27;candidates&#x27;).delete().eq(&#x27;email&#x27;, email);
      return { key: key, deleted: !error, shared: true };
    }
  };
})();
&lt;/script&gt;

&lt;body&gt;
&lt;div class=&quot;wrap&quot;&gt;

  &lt;div class=&quot;header&quot;&gt;

    &lt;h1&gt;면접관 참고화면 — 사전응답 요약&lt;/h1&gt;
    &lt;p&gt;지원자가 제출한 사전질문 응답입니다. 자동으로 표시되는 &quot;확인 필요&quot; 항목을 1차 면접에서 직접 물어봐 주세요. 점수·합격여부는 이 화면에서 판단하지 않습니다.&lt;/p&gt;

  &lt;div class=&quot;topbar-row&quot;&gt;
    &lt;span class=&quot;mono&quot; style=&quot;font-size:12px;color:var(--slate);&quot;&gt;지원자 &lt;span id=&quot;cand-count&quot;&gt;0&lt;/span&gt;명 제출됨&lt;/span&gt;
    &lt;button class=&quot;refresh-btn&quot; onclick=&quot;loadCandidates()&quot;&gt;⟳ 새로고침&lt;/button&gt;
  &lt;/div&gt;

  &lt;div class=&quot;pos-filter-chips&quot; id=&quot;pos-filter-chips&quot;&gt;&lt;/div&gt;

  &lt;div class=&quot;candidate-select&quot; id=&quot;candidate-select&quot;&gt;&lt;/div&gt;

  &lt;div id=&quot;empty-state&quot; class=&quot;empty-state&quot;&gt;
    아직 제출된 사전응답이 없습니다.&lt;br&gt;지원자가 사전인터뷰 폼을 제출하면 여기에 표시됩니다.
  &lt;/div&gt;

  &lt;div id=&quot;panels&quot;&gt;&lt;/div&gt;

&lt;script&gt;
const STORAGE_PREFIX = &quot;dc_prescreen&quot;;
let candidates = [];
let activeIndex = 0;
let activePosFilter = &quot;전체&quot;;

async function loadCandidates(){
  try{
    const listResult = await window.storage.list(STORAGE_PREFIX + &quot;:&quot;, true);
    const keys = (listResult &amp;&amp; listResult.keys) ? listResult.keys : [];
    const loaded = [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r &amp;&amp; r.value){
          loaded.push(JSON.parse(r.value));
        }
      }catch(e){ /* skip unreadable key */ }
    }
    loaded.sort((a,b)=&gt; new Date(b.submittedAt) - new Date(a.submittedAt));
    candidates = loaded;
    activeIndex = 0;
    render();
  }catch(e){
    console.error(&#x27;지원자 목록 로드 실패:&#x27;, e);
    candidates = [];
    render();
  }
}

function getFilteredCandidates(){
  if(activePosFilter === &quot;전체&quot;) return candidates;
  return candidates.filter(c =&gt; (c.position || &#x27;전기&#x27;) === activePosFilter);
}

function setPosFilter(pos){
  activePosFilter = pos;
  activeIndex = 0;
  render();
}

function renderPosFilters(){
  const positions = [&quot;전체&quot;, ...new Set(candidates.map(c =&gt; c.position || &#x27;전기&#x27;))];
  document.getElementById(&#x27;pos-filter-chips&#x27;).innerHTML = positions.map(p =&gt; `
    &lt;div class=&quot;pos-fchip ${p===activePosFilter?&#x27;active&#x27;:&#x27;&#x27;}&quot; onclick=&quot;setPosFilter(&#x27;${p}&#x27;)&quot;&gt;${p}${p!==&#x27;전체&#x27; ? &#x27;&#x27; : &#x27;&#x27;}&lt;/div&gt;
  `).join(&#x27;&#x27;);
}

function render(){
  const filtered = getFilteredCandidates();
  document.getElementById(&#x27;cand-count&#x27;).textContent = filtered.length;
  const emptyState = document.getElementById(&#x27;empty-state&#x27;);
  const select = document.getElementById(&#x27;candidate-select&#x27;);
  const panels = document.getElementById(&#x27;panels&#x27;);

  renderPosFilters();

  if(filtered.length === 0){
    emptyState.style.display = &#x27;block&#x27;;
    select.innerHTML = &#x27;&#x27;;
    panels.innerHTML = &#x27;&#x27;;
    return;
  }
  emptyState.style.display = &#x27;none&#x27;;

  select.innerHTML = filtered.map((c,i)=&gt;`
    &lt;div class=&quot;cand-chip ${i===activeIndex?&#x27;active&#x27;:&#x27;&#x27;}&quot; onclick=&quot;selectCandidate(${i})&quot;&gt;
      ${escapeHtml(c.candidateName || &#x27;이름없음&#x27;)}&lt;span class=&quot;pos-mini&quot;&gt;${escapeHtml(c.position || &#x27;전기&#x27;)}&lt;/span&gt;
      &lt;span class=&quot;ctime&quot;&gt;${formatDate(c.submittedAt)}&lt;/span&gt;
    &lt;/div&gt;
  `).join(&#x27;&#x27;);

  panels.innerHTML = filtered.map((c,i)=&gt; renderPanel(c,i)).join(&#x27;&#x27;);
}

function selectCandidate(i){ activeIndex = i; render(); }

function escapeHtml(s){
  return (s||&#x27;&#x27;).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g, m=&gt;({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#39;&#x27;}[m]));
}
function formatDate(iso){
  if(!iso) return &#x27;&#x27;;
  const d = new Date(iso);
  return d.toLocaleString(&#x27;ko-KR&#x27;, {month:&#x27;numeric&#x27;,day:&#x27;numeric&#x27;,hour:&#x27;2-digit&#x27;,minute:&#x27;2-digit&#x27;});
}

/* 디테일 부족 판단: 숫자/단위 패턴이 없으면 일반론적 답변으로 간주 */
function lacksDetail(text){
  if(!text) return true;
  const hasNumber = /\d/.test(text);
  const tooShort = text.trim().length &lt; 15;
  return tooShort || !hasNumber;
}

/* 신규 구조(expertise 객체)를 가진 레코드인지 확인 */
function hasExpertiseStructure(c){
  return c &amp;&amp; c.expertise &amp;&amp; typeof c.expertise === &#x27;object&#x27;;
}

function renderExpertiseQACards(c){
  if(!hasExpertiseStructure(c)) return &#x27;&#x27;;
  return Object.keys(c.expertise).map(qid=&gt;{
    const q = c.expertise[qid];
    const isMulti = Array.isArray(q.value);
    const valText = isMulti ? &#x27;&#x27; : (q.value || &#x27;&#x27;);
    const short = !isMulti &amp;&amp; q.type === &#x27;textarea&#x27; &amp;&amp; lacksDetail(valText);
    return `
    &lt;div class=&quot;qa-card ${short?&#x27;short&#x27;:&#x27;&#x27;}&quot;&gt;
      &lt;div class=&quot;qlabel&quot;&gt;${q.qnum} · ${escapeHtml(q.title)}&lt;/div&gt;
      ${isMulti
        ? `&lt;div class=&quot;chips&quot;&gt;${(q.value||[]).map(v=&gt;`&lt;span class=&quot;chip-item&quot;&gt;${escapeHtml(v)}&lt;/span&gt;`).join(&#x27;&#x27;) || &#x27;&lt;span class=&quot;qa empty&quot;&gt;미응답&lt;/span&gt;&#x27;}&lt;/div&gt;`
        : `&lt;div class=&quot;qa&quot;&gt;${escapeHtml(valText) || &#x27;&lt;span class=&quot;empty&quot;&gt;미응답&lt;/span&gt;&#x27;}&lt;/div&gt;`
      }
      ${short ? &#x27;&lt;span class=&quot;tag-lowdetail&quot;&gt;디테일 확인 필요&lt;/span&gt;&#x27; : &#x27;&#x27;}
    &lt;/div&gt;`;
  }).join(&#x27;&#x27;);
}

function buildFlagsForCandidate(c){
  const flags = [];
  if(hasExpertiseStructure(c)){
    Object.keys(c.expertise).forEach(qid=&gt;{
      const q = c.expertise[qid];
      if(!Array.isArray(q.value) &amp;&amp; q.type === &#x27;textarea&#x27; &amp;&amp; lacksDetail(q.value)){
        flags.push({type:&#x27;warn&#x27;, icon:&#x27;⚠&#x27;, text:`${q.qnum}(${q.title}) 응답에 구체적 수치·디테일이 부족합니다. 면접에서 직접 확인해보세요.`});
      }
      if(Array.isArray(q.value) &amp;&amp; q.value.length === 0){
        flags.push({type:&#x27;info&#x27;, icon:&#x27;ℹ&#x27;, text:`${q.qnum}(${q.title}) 응답이 없습니다.`});
      }
    });
  } else {
    // legacy electrical fallback
    if(lacksDetail(c.decisionBoundary)){

      flags.push({type:&#x27;info&#x27;, icon:&#x27;ℹ&#x27;, text:&#x27;참여 단계 응답이 없습니다.&#x27;});

  }

}

(function(){
  const PREFIX = &quot;dc_prescreen:&quot;;
  const _sb = window.__sb;       // shared supabase client (set after login/init)
  let _cache = {};               // key -&gt; last fetched row (for list+get pairing)

  function stripPrefix(key){ return (key||&#x27;&#x27;).indexOf(PREFIX)===0 ? key.slice(PREFIX.length) : key; }
  function recordToValue(row){
    // reconstruct the JSON string the existing code expects
    const rec = Object.assign({}, row.data || {});
    rec.status = row.status || rec.status || &#x27;사전질문 제출완료&#x27;;
    if(row.exec_interview_slot) rec.execInterviewSlot = row.exec_interview_slot;
    rec._key = PREFIX + row.email;
    return JSON.stringify(rec);
  }

  window.storage = {
    
      get: async function(key){
        const email = stripPrefix(key);
        const { data, error } = await _sb.from(&#x27;candidates&#x27;).select(&#x27;*&#x27;).eq(&#x27;email&#x27;, email).maybeSingle();
        if(error || !data) return null;
        return { key: key, value: recordToValue(data), shared: true };
      },
      list: async function(prefix){
        const { data, error } = await _sb.from(&#x27;candidates&#x27;).select(&#x27;*&#x27;).order(&#x27;submitted_at&#x27;, { ascending:false });
        if(error || !data) return { keys: [], prefix: prefix, shared: true };
        _cache = {};
        const keys = data.map(function(row){
          const k = PREFIX + row.email;
          _cache[k] = row;
          return k;
        });
        return { keys: keys, prefix: prefix, shared: true };
      },
    
    set: async function(key, value){
      const email = stripPrefix(key);
      let rec;
      try { rec = JSON.parse(value); } catch(e){ rec = {}; }
      const status = rec.status || &#x27;사전질문 제출완료&#x27;;
      const execSlot = rec.execInterviewSlot || &#x27;&#x27;;
      // strip columns we store separately so they don&#x27;t duplicate inside data
      const dataCopy = Object.assign({}, rec);
      delete dataCopy._key;
      const payload = {
        email: email,
        data: dataCopy,
        status: status,
        exec_interview_slot: execSlot,
        updated_at: new Date().toISOString()
      };
      // upsert on email (insert or overwrite same applicant)
      const { error } = await _sb.from(&#x27;candidates&#x27;).upsert(payload, { onConflict: &#x27;email&#x27; });
      if(error){ console.error(&#x27;Supabase set 실패:&#x27;, error); throw error; }
      return { key: key, value: value, shared: true };
    },
    delete: async function(key){
      const email = stripPrefix(key);
      const { error } = await _sb.from(&#x27;candidates&#x27;).delete().eq(&#x27;email&#x27;, email);
      return { key: key, deleted: !error, shared: true };
    }
  };
})();
&lt;/script&gt;

  .header .eyebrow{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:11px;letter-spacing:.1em;color:var(--gold);margin-bottom:8px;}
  .header h1{font-size:21px;margin:0;}
  .refresh-btn{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);color:var(--cream);
    border-radius:8px;padding:9px 14px;font-size:12.5px;cursor:pointer;font-weight:600;}

  .stat-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line);
    border-radius:10px;overflow:hidden;margin-bottom:20px;}
  .stat-cell{background:var(--card);padding:16px;text-align:center;}
  .stat-cell .snum{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:24px;font-weight:700;color:var(--navy);}
  .stat-cell .slabel{font-size:11.5px;color:var(--slate);margin-top:4px;}

  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:10px;}
  .filter-chips{display:flex;gap:6px;flex-wrap:wrap;}
  .fchip{background:var(--card);border:1.5px solid var(--line);border-radius:7px;padding:7px 12px;
    font-size:12.5px;cursor:pointer;color:var(--slate);font-weight:600;}
  .fchip.active{background:var(--navy);color:var(--cream);border-color:var(--navy);}

  .pos-badge-table{
    display:inline-block; font-family:&#x27;JetBrains Mono&#x27;,monospace; font-size:10.5px; font-weight:700;
    padding:3px 8px; border-radius:5px; letter-spacing:.02em;
    background:rgba(201,169,97,0.18); color:var(--navy); border:1px solid var(--gold);
  }
  .pos-filter-group{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-right:10px;padding-right:10px;border-right:1.5px solid var(--line);}
  @media (max-width:700px){
    .pos-filter-group{border-right:none;padding-right:0;margin-right:0;width:100%;}
  }

  .table-wrap{background:var(--card);border:1.5px solid var(--line);border-radius:12px;overflow:hidden;}
  table{width:100%;border-collapse:collapse;font-size:13.5px;}
  thead th{background:#EFEAE0;color:var(--navy);font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:11px;
    letter-spacing:.04em;text-align:left;padding:12px 14px;border-bottom:1.5px solid var(--line);white-space:nowrap;}
  tbody td{padding:13px 14px;border-bottom:1px solid var(--line);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover{background:rgba(61,90,115,0.04);}
  .name-cell{font-weight:700;color:var(--navy);}
  .email-cell{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:11.5px;color:var(--slate);}
  .slot-cell{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:12px;}

  .status-select{
    font-family:&#x27;Noto Sans KR&#x27;,sans-serif;font-size:12.5px;font-weight:600;border-radius:6px;
    padding:6px 10px;border:1.5px solid var(--line);cursor:pointer;background:var(--card);
  }
  .status-select[data-status=&quot;사전질문 제출완료&quot;]{color:var(--slate);border-color:var(--slate);}
  .status-select[data-status=&quot;1차면접 예정&quot;]{color:#8A6A1E;border-color:var(--gold);background:rgba(201,169,97,0.1);}
  .status-select[data-status=&quot;1차면접 완료&quot;]{color:var(--navy);border-color:var(--navy);background:rgba(15,27,46,0.06);}
  .status-select[data-status=&quot;임원면접 예정&quot;]{color:#7A3FA0;border-color:#7A3FA0;background:rgba(122,63,160,0.08);}
  .status-select[data-status=&quot;임원면접 완료&quot;]{color:#4A2D6B;border-color:#4A2D6B;background:rgba(74,45,107,0.08);}
  .status-select[data-status=&quot;합격&quot;]{color:var(--ok);border-color:var(--ok);background:rgba(47,111,78,0.08);}
  .status-select[data-status=&quot;불합격&quot;]{color:var(--warn);border-color:var(--warn);background:rgba(166,67,44,0.08);}

  .flag-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;}
  .flag-dot.warn{background:var(--warn);}
  .flag-dot.ok{background:var(--ok);}

  .detail-btn{background:none;border:1.5px solid var(--line);border-radius:6px;padding:6px 11px;
    font-size:12px;cursor:pointer;color:var(--slate);font-weight:600;}

  .empty-row td{text-align:center;color:var(--slate);padding:50px 14px;font-size:14px;}

  /* modal */
  .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(15,27,46,0.6);z-index:50;
    align-items:center;justify-content:center;padding:20px;}
  .modal-backdrop.active{display:flex;}
  .modal{background:var(--cream);border-radius:12px;max-width:560px;width:100%;max-height:85vh;overflow-y:auto;padding:26px;}
  .modal h2{font-size:18px;color:var(--navy);margin:0 0 4px;}
  .modal .msub{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:12px;color:var(--slate);margin-bottom:18px;}
  .modal .mqlabel{font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:11px;color:var(--gold);font-weight:700;margin:14px 0 4px;}
  .modal .mqa{font-size:14px;line-height:1.6;color:var(--ink);}
  .modal-close{position:sticky;top:0;float:right;background:var(--navy);color:var(--cream);border:none;
    border-radius:6px;padding:7px 12px;font-size:12.5px;cursor:pointer;font-weight:600;}

  @media (max-width:980px) and (min-width:701px){
    .stat-grid{grid-template-columns:repeat(4,1fr);}
  }
  @media (max-width:700px){
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    table{font-size:12.5px;}
    thead th, tbody td{padding:10px 8px;}
  }
  .summary-card{background:var(--card);border:1.5px solid var(--line);border-radius:10px;padding:16px;}
  .summary-row{display:flex;justify-content:space-between;gap:12px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px;}
  .summary-row:last-child{border-bottom:none;}
  .summary-row .slabel{color:var(--slate);flex-shrink:0;}
  .summary-row .sval{font-weight:700;color:var(--navy);text-align:right;word-break:break-word;}
&lt;/style&gt;
&lt;/head&gt;
&lt;body&gt;
&lt;div class=&quot;wrap&quot;&gt;

  &lt;div class=&quot;header&quot;&gt;
    &lt;div&gt;
      &lt;div class=&quot;eyebrow&quot;&gt;SK BROADBAND · DC ENGINEERING&lt;/div&gt;
      &lt;h1&gt;HR 대시보드 — 전형상태 / 면접일정&lt;/h1&gt;
    &lt;/div&gt;
    &lt;div style=&quot;display:flex;gap:8px;&quot;&gt;
      &lt;button class=&quot;refresh-btn&quot; style=&quot;background:var(--gold);border-color:var(--gold);color:var(--navy);font-weight:700;&quot; onclick=&quot;openPasteModal()&quot;&gt;✉ 메일 붙여넣어 등록&lt;/button&gt;
      &lt;button class=&quot;refresh-btn&quot; onclick=&quot;loadCandidates()&quot;&gt;⟳ 새로고침&lt;/button&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;stat-grid&quot; id=&quot;stat-grid&quot;&gt;&lt;/div&gt;

  &lt;div class=&quot;toolbar&quot;&gt;
    &lt;div style=&quot;display:flex;align-items:center;flex-wrap:wrap;gap:10px;&quot;&gt;
      &lt;div class=&quot;pos-filter-group&quot; id=&quot;pos-filter-group&quot;&gt;&lt;/div&gt;
      &lt;div class=&quot;filter-chips&quot; id=&quot;filter-chips&quot;&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;span class=&quot;mono&quot; style=&quot;font-size:12px;color:var(--slate);&quot;&gt;전체 &lt;span id=&quot;total-count&quot;&gt;0&lt;/span&gt;명&lt;/span&gt;
  &lt;/div&gt;

  &lt;div class=&quot;table-wrap&quot;&gt;
    &lt;table&gt;
      &lt;thead&gt;
        &lt;tr&gt;
          &lt;th&gt;직무&lt;/th&gt;
          &lt;th&gt;지원자&lt;/th&gt;
          &lt;th&gt;이메일&lt;/th&gt;
          &lt;th&gt;제출일시&lt;/th&gt;
          &lt;th&gt;1차 면접 일정&lt;/th&gt;
          &lt;th&gt;임원면접 일정&lt;/th&gt;
          &lt;th&gt;확인필요&lt;/th&gt;
          &lt;th&gt;전형상태&lt;/th&gt;
          &lt;th&gt;&lt;/th&gt;
        &lt;/tr&gt;
      &lt;/thead&gt;
      &lt;tbody id=&quot;table-body&quot;&gt;
        &lt;tr class=&quot;empty-row&quot;&gt;&lt;td colspan=&quot;9&quot;&gt;아직 제출된 지원자가 없습니다.&lt;/td&gt;&lt;/tr&gt;
      &lt;/tbody&gt;
    &lt;/table&gt;
  &lt;/div&gt;

&lt;/div&gt;

&lt;div class=&quot;modal-backdrop&quot; id=&quot;modal-backdrop&quot; onclick=&quot;if(event.target===this) closeModal()&quot;&gt;
  &lt;div class=&quot;modal&quot; id=&quot;modal-content&quot;&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;script&gt;
const STORAGE_PREFIX = &quot;dc_prescreen&quot;;
const STATUS_OPTIONS = [&quot;사전질문 제출완료&quot;,&quot;1차면접 예정&quot;,&quot;1차면접 완료&quot;,&quot;임원면접 예정&quot;,&quot;임원면접 완료&quot;,&quot;합격&quot;,&quot;불합격&quot;];
let candidates = [];
let activeFilter = &quot;전체&quot;;
let activePosFilter = &quot;전체&quot;;

function escapeHtml(s){
  return (s||&#x27;&#x27;).replace(/[&amp;&lt;&gt;&quot;&#x27;]/g, m=&gt;({&#x27;&amp;&#x27;:&#x27;&amp;amp;&#x27;,&#x27;&lt;&#x27;:&#x27;&amp;lt;&#x27;,&#x27;&gt;&#x27;:&#x27;&amp;gt;&#x27;,&#x27;&quot;&#x27;:&#x27;&amp;quot;&#x27;,&quot;&#x27;&quot;:&#x27;&amp;#39;&#x27;}[m]));
}
function formatDate(iso){
  if(!iso) return &#x27;—&#x27;;
  return new Date(iso).toLocaleString(&#x27;ko-KR&#x27;,{month:&#x27;numeric&#x27;,day:&#x27;numeric&#x27;,hour:&#x27;2-digit&#x27;,minute:&#x27;2-digit&#x27;});
}
function lacksDetail(text){
  if(!text) return true;
  return text.trim().length &lt; 15 || !/\d/.test(text);
}

/* 신규 구조(expertise 객체)를 가진 레코드인지 확인 */
function hasExpertiseStructure(c){
  return c &amp;&amp; c.expertise &amp;&amp; typeof c.expertise === &#x27;object&#x27;;
}

/* 해당 후보의 직무전문성 응답 중 &quot;디테일 확인 필요&quot;(서술형+짧은 답변)가 있는지 */
function candidateNeedsCheck(c){
  if(hasExpertiseStructure(c)){
    return Object.values(c.expertise).some(q =&gt; q.type === &#x27;textarea&#x27; &amp;&amp; !Array.isArray(q.value) &amp;&amp; lacksDetail(q.value));
  }
  return lacksDetail(c.decisionBoundary) || lacksDetail(c.techIssue);
}

async function loadCandidates(){
  try{
    const listResult = await window.storage.list(STORAGE_PREFIX + &quot;:&quot;, true);
    const keys = (listResult &amp;&amp; listResult.keys) ? listResult.keys : [];
    const loaded = [];
    for(const k of keys){
      try{
        const r = await window.storage.get(k, true);
        if(r &amp;&amp; r.value){
          const rec = JSON.parse(r.value);
          rec._key = k;
          if(!rec.status) rec.status = &quot;사전질문 제출완료&quot;;
          loaded.push(rec);
        }
      }catch(e){ /* skip */ }
    }
    loaded.sort((a,b)=&gt; new Date(b.submittedAt) - new Date(a.submittedAt));
    candidates = loaded;
    render();
  }catch(e){
    console.error(&#x27;지원자 목록 로드 실패:&#x27;, e);
    candidates = [];
    render();
  }
}

async function updateStatus(key, newStatus){
  const c = candidates.find(x=&gt;x._key===key);
  if(!c) return;
  c.status = newStatus;
  try{
    await window.storage.set(key, JSON.stringify(c), true);
  }catch(e){
    console.error(&#x27;상태 저장 실패:&#x27;, e);
  }
  render();
}

async function updateExecSlot(key, value){
  const c = candidates.find(x=&gt;x._key===key);
  if(!c) return;
  c.execInterviewSlot = value.trim();
  try{
    await window.storage.set(key, JSON.stringify(c), true);
  }catch(e){
    console.error(&#x27;임원면접 일정 저장 실패:&#x27;, e);
  }
  // re-render는 생략 (입력창 포커스 유지를 위해), 데이터는 이미 반영됨
}

function renderStats(){
  const counts = {};
  STATUS_OPTIONS.forEach(s=&gt;counts[s]=0);
  candidates.forEach(c=&gt;{ counts[c.status] = (counts[c.status]||0) + 1; });
  const grid = document.getElementById(&#x27;stat-grid&#x27;);
  grid.innerHTML = `
    &lt;div class=&quot;stat-cell&quot;&gt;&lt;div class=&quot;snum&quot;&gt;${candidates.length}&lt;/div&gt;&lt;div class=&quot;slabel&quot;&gt;전체 지원자&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;stat-cell&quot;&gt;&lt;div class=&quot;snum&quot;&gt;${counts[&quot;1차면접 예정&quot;]||0}&lt;/div&gt;&lt;div class=&quot;slabel&quot;&gt;1차면접 예정&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;stat-cell&quot;&gt;&lt;div class=&quot;snum&quot;&gt;${counts[&quot;1차면접 완료&quot;]||0}&lt;/div&gt;&lt;div class=&quot;slabel&quot;&gt;1차면접 완료&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;stat-cell&quot;&gt;&lt;div class=&quot;snum&quot;&gt;${counts[&quot;임원면접 예정&quot;]||0}&lt;/div&gt;&lt;div class=&quot;slabel&quot;&gt;임원면접 예정&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;stat-cell&quot;&gt;&lt;div class=&quot;snum&quot;&gt;${counts[&quot;임원면접 완료&quot;]||0}&lt;/div&gt;&lt;div class=&quot;slabel&quot;&gt;임원면접 완료&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;stat-cell&quot;&gt;&lt;div class=&quot;snum&quot;&gt;${counts[&quot;합격&quot;]||0}&lt;/div&gt;&lt;div class=&quot;slabel&quot;&gt;합격&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;stat-cell&quot;&gt;&lt;div class=&quot;snum&quot;&gt;${counts[&quot;불합격&quot;]||0}&lt;/div&gt;&lt;div class=&quot;slabel&quot;&gt;불합격&lt;/div&gt;&lt;/div&gt;
  `;
}

function renderPosFilters(){
  const positions = [&quot;전체&quot;, ...new Set(candidates.map(c =&gt; c.position || &#x27;전기&#x27;))];
  document.getElementById(&#x27;pos-filter-group&#x27;).innerHTML = positions.map(p=&gt;`
    &lt;div class=&quot;fchip ${p===activePosFilter?&#x27;active&#x27;:&#x27;&#x27;}&quot; onclick=&quot;setPosFilter(&#x27;${p}&#x27;)&quot;&gt;${p}&lt;/div&gt;
  `).join(&#x27;&#x27;);
}
function setPosFilter(p){ activePosFilter = p; render(); }

function renderFilters(){
  const opts = [&quot;전체&quot;, ...STATUS_OPTIONS];
  document.getElementById(&#x27;filter-chips&#x27;).innerHTML = opts.map(o=&gt;`
    &lt;div class=&quot;fchip ${o===activeFilter?&#x27;active&#x27;:&#x27;&#x27;}&quot; onclick=&quot;setFilter(&#x27;${o}&#x27;)&quot;&gt;${o}&lt;/div&gt;
  `).join(&#x27;&#x27;);
}
function setFilter(f){ activeFilter = f; render(); }

function getFilteredCandidates(){
  return candidates.filter(c=&gt;{
    const statusOk = activeFilter===&quot;전체&quot; || c.status===activeFilter;
    const posOk = activePosFilter===&quot;전체&quot; || (c.position||&#x27;전기&#x27;)===activePosFilter;
    return statusOk &amp;&amp; posOk;
  });
}

function renderTable(){
  const tbody = document.getElementById(&#x27;table-body&#x27;);
  const filtered = getFilteredCandidates();
  document.getElementById(&#x27;total-count&#x27;).textContent = candidates.length;

  if(filtered.length===0){
    tbody.innerHTML = `&lt;tr class=&quot;empty-row&quot;&gt;&lt;td colspan=&quot;9&quot;&gt;표시할 지원자가 없습니다.&lt;/td&gt;&lt;/tr&gt;`;
    return;
  }

  tbody.innerHTML = filtered.map(c=&gt;{
    const needsCheck = candidateNeedsCheck(c);
    const slotText = c.cannotAttend
      ? `⚠ 참여불가 (요청: ${escapeHtml(c.altTimeRequest||&#x27;미작성&#x27;)})`
      : escapeHtml(c.interviewSlot || &#x27;미선택&#x27;);
    return `
    &lt;tr&gt;
      &lt;td&gt;&lt;span class=&quot;pos-badge-table&quot;&gt;${escapeHtml(c.position || &#x27;전기&#x27;)}&lt;/span&gt;&lt;/td&gt;
      &lt;td class=&quot;name-cell&quot;&gt;${escapeHtml(c.candidateName)}&lt;/td&gt;
      &lt;td class=&quot;email-cell&quot;&gt;${escapeHtml(c.candidateEmail)}&lt;/td&gt;
      &lt;td class=&quot;mono&quot; style=&quot;font-size:12px;color:var(--slate);&quot;&gt;${formatDate(c.submittedAt)}&lt;/td&gt;
      &lt;td class=&quot;slot-cell&quot; style=&quot;${c.cannotAttend ? &#x27;color:var(--warn);font-weight:700;&#x27; : &#x27;&#x27;}&quot;&gt;${slotText}&lt;/td&gt;
      &lt;td&gt;
        &lt;input type=&quot;text&quot; class=&quot;exec-slot-input&quot; value=&quot;${escapeHtml(c.execInterviewSlot||&#x27;&#x27;)}&quot; placeholder=&quot;예: 6/30(화) 14:00&quot;
          style=&quot;width:130px;font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:11.5px;padding:6px 8px;border:1.5px solid var(--line);border-radius:6px;&quot;
          onblur=&quot;updateExecSlot(&#x27;${c._key}&#x27;, this.value)&quot;&gt;
      &lt;/td&gt;
      &lt;td&gt;${needsCheck ? &#x27;&lt;span class=&quot;flag-dot warn&quot;&gt;&lt;/span&gt;디테일 확인&#x27; : &#x27;&lt;span class=&quot;flag-dot ok&quot;&gt;&lt;/span&gt;양호&#x27;}&lt;/td&gt;
      &lt;td&gt;
        &lt;select class=&quot;status-select&quot; data-status=&quot;${c.status}&quot; onchange=&quot;updateStatus(&#x27;${c._key}&#x27;, this.value)&quot;&gt;
          ${STATUS_OPTIONS.map(s=&gt;`&lt;option value=&quot;${s}&quot; ${s===c.status?&#x27;selected&#x27;:&#x27;&#x27;}&gt;${s}&lt;/option&gt;`).join(&#x27;&#x27;)}
        &lt;/select&gt;
      &lt;/td&gt;
      &lt;td&gt;&lt;button class=&quot;detail-btn&quot; onclick=&quot;openModal(&#x27;${c._key}&#x27;)&quot;&gt;응답보기&lt;/button&gt;&lt;/td&gt;
    &lt;/tr&gt;
  `;
  }).join(&#x27;&#x27;);
}

function render(){
  renderStats();
  renderPosFilters();
  renderFilters();
  renderTable();
}

function openModal(key){
  const c = candidates.find(x=&gt;x._key===key);
  if(!c) return;
  const m = document.getElementById(&#x27;modal-content&#x27;);
  const scheduleText = c.cannotAttend
    ? `참여불가 (요청: ${escapeHtml(c.altTimeRequest||&#x27;미작성&#x27;)})`
    : (escapeHtml(c.interviewSlot)||&#x27;미선택&#x27;);

  let expertiseHtml = &#x27;&#x27;;
  if(hasExpertiseStructure(c)){
    expertiseHtml = Object.keys(c.expertise).map(qid=&gt;{
      const q = c.expertise[qid];
      const val = Array.isArray(q.value) ? (q.value.join(&#x27;, &#x27;)||&#x27;미응답&#x27;) : (q.value||&#x27;미응답&#x27;);
      return `&lt;div class=&quot;mqlabel&quot;&gt;${q.qnum} · ${escapeHtml(q.title)}&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(val)}&lt;/div&gt;`;
    }).join(&#x27;&#x27;);
  } else {
    expertiseHtml = `
      &lt;div class=&quot;mqlabel&quot;&gt;Q1 · 프로젝트명&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(c.project)||&#x27;미응답&#x27;}&lt;/div&gt;
      &lt;div class=&quot;mqlabel&quot;&gt;Q2 · 의사결정 경계&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(c.decisionBoundary)||&#x27;미응답&#x27;}&lt;/div&gt;
      &lt;div class=&quot;mqlabel&quot;&gt;Q3 · 기술적 이슈&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(c.techIssue)||&#x27;미응답&#x27;}&lt;/div&gt;
      &lt;div class=&quot;mqlabel&quot;&gt;Q4 · 참여 단계&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${(c.phasesInvolved||[]).join(&#x27;, &#x27;)||&#x27;미응답&#x27;}&lt;/div&gt;
      &lt;div class=&quot;mqlabel&quot;&gt;Q5 · 무중단작업 시나리오&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(c.scenarioMaintenance)||&#x27;미응답&#x27;}&lt;/div&gt;
      &lt;div class=&quot;mqlabel&quot;&gt;Q6 · 벤더 의견충돌 우선순위&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(c.scenarioVendorConflict)||&#x27;미응답&#x27;}&lt;/div&gt;
    `;
  }

  m.innerHTML = `
    &lt;button class=&quot;modal-close&quot; onclick=&quot;closeModal()&quot;&gt;닫기&lt;/button&gt;
    &lt;h2&gt;${escapeHtml(c.candidateName)} &lt;span class=&quot;pos-badge-table&quot;&gt;${escapeHtml(c.position||&#x27;전기&#x27;)}&lt;/span&gt;&lt;/h2&gt;
    &lt;div class=&quot;msub&quot;&gt;${escapeHtml(c.candidateEmail)} · 제출 ${formatDate(c.submittedAt)} · 1차면접 ${scheduleText}${c.execInterviewSlot ? &#x27; · 임원면접 &#x27;+escapeHtml(c.execInterviewSlot) : &#x27;&#x27;}&lt;/div&gt;

    ${expertiseHtml}

    &lt;div class=&quot;mqlabel&quot;&gt;Q7 · 지역근무 우선고려사항&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(c.relocationConsideration)||&#x27;미응답&#x27;}&lt;/div&gt;
    &lt;div class=&quot;mqlabel&quot;&gt;Q8 · 현장 우선순위&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${(c.priorityRank||[]).join(&#x27; &gt; &#x27;)||&#x27;미응답&#x27;}&lt;/div&gt;
    &lt;div class=&quot;mqlabel&quot;&gt;Q9 · 이직 희망사유&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(c.turnoverReason)||&#x27;미응답&#x27;}&lt;/div&gt;
    &lt;div class=&quot;mqlabel&quot;&gt;Q10 · 선호 리더십 스타일&lt;/div&gt;&lt;div class=&quot;mqa&quot;&gt;${escapeHtml(c.leadershipPref)||&#x27;미응답&#x27;}&lt;/div&gt;
  `;
  document.getElementById(&#x27;modal-backdrop&#x27;).classList.add(&#x27;active&#x27;);
}

/* ============ 메일 본문 붙여넣기 → 파싱 → 등록 ============ */
function openPasteModal(){
  const m = document.getElementById(&#x27;modal-content&#x27;);
  m.innerHTML = `
    &lt;button class=&quot;modal-close&quot; onclick=&quot;closeModal()&quot;&gt;닫기&lt;/button&gt;
    &lt;h2&gt;메일 본문 붙여넣어 등록&lt;/h2&gt;
    &lt;div class=&quot;msub&quot;&gt;지원자가 보낸 메일의 본문 전체를 그대로 복사해서 아래에 붙여넣어주세요. (전기/기계/시스템 모두 지원)&lt;/div&gt;
    &lt;textarea id=&quot;paste-textarea&quot; rows=&quot;14&quot; style=&quot;width:100%;font-family:&#x27;JetBrains Mono&#x27;,monospace;font-size:12.5px;
      border:1.5px solid var(--line);border-radius:8px;padding:12px;box-sizing:border-box;resize:vertical;&quot;
      placeholder=&quot;지원자: 홍길동 (hong@email.com)&amp;#10;제출시각: 2026. 6. 22. 오후 3:00:00&amp;#10;지원직무: 전기&amp;#10;&amp;#10;[1차 면접 참여 가능 여부] 참여 가능&amp;#10;&amp;#10;--- 직무전문성 (전기) ---&amp;#10;Q1. ...&amp;#10;(이하 메일 본문 전체를 붙여넣어주세요)&quot;&gt;&lt;/textarea&gt;
    &lt;div id=&quot;paste-error&quot; style=&quot;display:none;color:var(--warn);font-size:12.5px;margin-top:8px;&quot;&gt;&lt;/div&gt;
    &lt;div id=&quot;paste-preview&quot; style=&quot;margin-top:14px;&quot;&gt;&lt;/div&gt;
    &lt;button class=&quot;detail-btn&quot; style=&quot;width:100%;margin-top:14px;background:var(--navy);color:var(--cream);border:none;padding:11px;font-size:13.5px;&quot;
      onclick=&quot;previewPastedEmail()&quot;&gt;미리보기 확인&lt;/button&gt;

  document.getElementById(&#x27;modal-backdrop&#x27;).classList.add(&#x27;active&#x27;);

function parseEmailBody(text){
  const get = (regex) =&gt; {
    const m = text.match(regex);
    return m ? m[1].trim() : &#x27;&#x27;;
  };
  const candidateLine = get(/지원자:\s*(.+)/);
  let candidateName = candidateLine, candidateEmail = &#x27;&#x27;;
  const emailMatch = candidateLine.match(/^(.*?)\s*\((.+@.+)\)\s*$/);
  if(emailMatch){
    candidateName = emailMatch[1].trim();
    candidateEmail = emailMatch[2].trim();
  }

  const submittedRaw = get(/제출시각:\s*(.+)/);
  const position = get(/지원직무:\s*(.+)/) || &#x27;전기&#x27;;

  const attendRaw = get(/\[1차 면접 참여 가능 여부\]\s*(.+)/);
  const cannotAttend = /참여\s*불가/.test(attendRaw);
  const altTimeRequest = get(/\[별도 요청 일정\]\s*(.+)/);

  // 신규 형식: &quot;Qn. 제목: 값&quot; 라인을 모두 파싱해서 expertise 객체로 구성
  // (구버전 메일도 동일한 정규식으로 잡히므로, 레거시 필드명도 함께 매핑)
  const legacyFieldMap = {
    &#x27;프로젝트명&#x27;: &#x27;project&#x27;,
    &#x27;의사결정 경계&#x27;: &#x27;decisionBoundary&#x27;,
    &#x27;기술적 이슈&#x27;: &#x27;techIssue&#x27;,
    &#x27;참여 단계&#x27;: &#x27;phasesInvolved&#x27;,
    &#x27;무중단작업 시나리오&#x27;: &#x27;scenarioMaintenance&#x27;,
    &#x27;벤더 의견충돌 우선순위&#x27;: &#x27;scenarioVendorConflict&#x27;,
  };

  const expertise = {};
  const legacy = {};
  const lineRegex = /Q(\d+)\.\s*([^:]+):\s*(.+)/g;
  let m;
  let leadershipPref = &#x27;&#x27;, relocationConsideration = &#x27;&#x27;, turnoverReason = &#x27;&#x27;;
  let priorityRaw = &#x27;&#x27;;
  while((m = lineRegex.exec(text)) !== null){
    const qnumInt = parseInt(m[1], 10);
    const title = m[2].trim();
    const value = m[3].trim();
    if(qnumInt &lt;= 6){
      // 직무전문성 (전기/기계/시스템 공통: Q1~Q6)
      const qid = &#x27;q&#x27; + qnumInt;
      const isList = /,/.test(value) &amp;&amp; legacyFieldMap[title] === &#x27;phasesInvolved&#x27;;
      // 메일 본문만으로는 원래 질문이 서술형인지 선택형인지 구분할 수 없으므로
      // type을 &#x27;unknown&#x27;으로 두고, 디테일 확인 로직에서는 textarea로 확정된 것만 검사한다.
      expertise[qid] = { qnum: &#x27;Q&#x27;+qnumInt, title: title, value: value, type: &#x27;unknown&#x27; };
      if(legacyFieldMap[title]){
        legacy[legacyFieldMap[title]] = legacyFieldMap[title]===&#x27;phasesInvolved&#x27;
          ? value.split(&#x27;,&#x27;).map(s=&gt;s.trim()).filter(Boolean)
          : value;
      }
    } else if(qnumInt === 7){
      relocationConsideration = value;
    } else if(qnumInt === 8){
      priorityRaw = value;
    } else if(qnumInt === 9){
      turnoverReason = value;
    } else if(qnumInt === 10){
      leadershipPref = value;
    }
  }

  const rec = {
    candidateName, candidateEmail,
    submittedAt: new Date().toISOString(), // 붙여넣은 시점 기준 (원본 제출시각은 표시용으로만 별도 보관)
    originalSubmittedAtText: submittedRaw,
    position,
    expertise,
    relocationConsideration,
    priorityRank: priorityRaw ? priorityRaw.split(&#x27;&gt;&#x27;).map(s=&gt;s.trim()).filter(Boolean) : [],
    turnoverReason,
    leadershipPref,
    cannotAttend,
    altTimeRequest,
    interviewSlot: cannotAttend ? `제시된 시간 참여 불가 (요청: ${altTimeRequest||&#x27;미작성&#x27;})` : &#x27;안내받은 시간 참여 가능&#x27;,
    status: &#x27;사전질문 제출완료&#x27;
  };

  if(position === &#x27;전기&#x27;){
    Object.assign(rec, legacy);
  }

  return rec;
}

function previewPastedEmail(){
  const text = document.getElementById(&#x27;paste-textarea&#x27;).value;
  const errEl = document.getElementById(&#x27;paste-error&#x27;);
  const previewEl = document.getElementById(&#x27;paste-preview&#x27;);

  if(!text.trim()){
    errEl.style.display=&#x27;block&#x27;;
    errEl.textContent = &#x27;붙여넣을 메일 본문이 없습니다.&#x27;;
    previewEl.innerHTML = &#x27;&#x27;;
    window._pendingPasteRecord = null;
    return;
  }

  const rec = parseEmailBody(text);

  if(!rec.candidateName || !rec.candidateEmail){
    errEl.style.display=&#x27;block&#x27;;
    errEl.textContent = &#x27;지원자 이름/이메일을 인식하지 못했습니다. &quot;지원자: 이름 (이메일)&quot; 줄이 포함되어 있는지 확인해주세요.&#x27;;
    previewEl.innerHTML = &#x27;&#x27;;
    window._pendingPasteRecord = null;
    return;
  }
  errEl.style.display=&#x27;none&#x27;;

  // JSON을 HTML 속성에 직접 넣으면 괄호/슬래시 등 특수문자로 깨질 수 있어 전역변수에 보관
  window._pendingPasteRecord = rec;

  const expertisePreview = Object.keys(rec.expertise||{}).map(qid=&gt;{
    const q = rec.expertise[qid];
    return `&lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;${escapeHtml(q.qnum)} ${escapeHtml(q.title)}&lt;/span&gt;&lt;span class=&quot;sval&quot;&gt;${escapeHtml(q.value)||&#x27;-&#x27;}&lt;/span&gt;&lt;/div&gt;`;
  }).join(&#x27;&#x27;);

  previewEl.innerHTML = `
    &lt;div class=&quot;summary-card&quot; style=&quot;margin-bottom:0;&quot;&gt;
      &lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;지원자&lt;/span&gt;&lt;span class=&quot;sval&quot;&gt;${escapeHtml(rec.candidateName)}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;이메일&lt;/span&gt;&lt;span class=&quot;sval&quot;&gt;${escapeHtml(rec.candidateEmail)}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;지원직무&lt;/span&gt;&lt;span class=&quot;sval&quot;&gt;${escapeHtml(rec.position)}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;1차 면접 일정&lt;/span&gt;&lt;span class=&quot;sval&quot; style=&quot;text-align:right;max-width:280px;&quot;&gt;${escapeHtml(rec.interviewSlot)||&#x27;미선택&#x27;}&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;div class=&quot;summary-card&quot; style=&quot;margin-top:10px;margin-bottom:0;&quot;&gt;
      ${expertisePreview}
      &lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;Q7 지역근무 우선고려사항&lt;/span&gt;&lt;span class=&quot;sval&quot;&gt;${escapeHtml(rec.relocationConsideration)||&#x27;-&#x27;}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;Q8 현장 우선순위&lt;/span&gt;&lt;span class=&quot;sval&quot;&gt;${(rec.priorityRank||[]).join(&#x27; &gt; &#x27;)||&#x27;-&#x27;}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;Q9 이직 희망사유&lt;/span&gt;&lt;span class=&quot;sval&quot;&gt;${escapeHtml(rec.turnoverReason)||&#x27;-&#x27;}&lt;/span&gt;&lt;/div&gt;
      &lt;div class=&quot;summary-row&quot;&gt;&lt;span class=&quot;slabel&quot;&gt;Q10 선호 리더십 스타일&lt;/span&gt;&lt;span class=&quot;sval&quot;&gt;${escapeHtml(rec.leadershipPref)||&#x27;-&#x27;}&lt;/span&gt;&lt;/div&gt;
    &lt;/div&gt;
    &lt;button class=&quot;detail-btn&quot; style=&quot;width:100%;margin-top:12px;background:var(--ok);color:white;border:none;padding:11px;font-size:13.5px;&quot;
      onclick=&quot;registerPastedCandidate()&quot;&gt;이 내용으로 등록하기&lt;/button&gt;
  `;
}

async function registerPastedCandidate(){
  const rec = window._pendingPasteRecord;
  if(!rec){
    alert(&#x27;등록할 데이터가 없습니다. 미리보기를 다시 확인해주세요.&#x27;);
    return;
  }
  try{
    const key = `${STORAGE_PREFIX}:${rec.candidateEmail || rec.candidateName}`;
    await window.storage.set(key, JSON.stringify(rec), true);
    window._pendingPasteRecord = null;
    closeModal();
    await loadCandidates();
  }catch(e){
    console.error(&#x27;등록 실패:&#x27;, e);
    alert(&#x27;등록 중 오류가 발생했습니다: &#x27; + (e &amp;&amp; e.message ? e.message : &#x27;알 수 없는 오류&#x27;) + &#x27;\n다시 시도해주세요.&#x27;);
  }
}

loadCandidates();

<script>
function hideLoading(id){
  const el = document.getElementById(id);
  if(el) el.classList.add('hidden');
}

function switchTab(target){
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+target).classList.add('active');

  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.target===target));
  document.querySelectorAll('.tabm').forEach(t=>t.classList.toggle('active', t.dataset.target===target));
}

document.querySelectorAll('.tab').forEach(t=>{
  t.addEventListener('click', ()=>switchTab(t.dataset.target));
});
document.querySelectorAll('.tabm').forEach(t=>{
  t.addEventListener('click', ()=>switchTab(t.dataset.target));
});
</script>


<style>
  /* 기본: 면접관/직원 전용 탭 숨김 (지원자에게는 지원자 탭만 보임) */
  body:not(.staff-mode) .tab[data-target="interviewer"],
  body:not(.staff-mode) .tab[data-target="hr"],
  body:not(.staff-mode) .tabm[data-target="interviewer"],
  body:not(.staff-mode) .tabm[data-target="hr"]{
    display:none !important;
  }
  /* 일정취합 탭: #interview 또는 #staff로 접근했을 때만 표시 (지원자에게는 숨김) */
  body:not(.interview-mode):not(.staff-mode) .tab[data-target="schedule"],
  body:not(.interview-mode):not(.staff-mode) .tabm[data-target="schedule"]{
    display:none !important;
  }
</style>
<script>
(function(){
  var STAFF_HASH = "#staff";       // 직원용 링크 (면접관/HR 화면 + 일정취합 모두 표시)
  var INTERVIEW_HASH = "#interview"; // 면접관용 링크 (일정취합 탭만 추가 표시)
  function currentHash(){ return (location.hash || "").toLowerCase(); }
  function isStaff(){ return currentHash() === STAFF_HASH; }
  function isInterview(){ return currentHash() === INTERVIEW_HASH; }

  function applyMode(){
    if(isStaff()){
      document.body.classList.add("staff-mode");
      document.body.classList.remove("interview-mode");
    }else if(isInterview()){
      document.body.classList.remove("staff-mode");
      document.body.classList.add("interview-mode");
      // 면접관 링크로는 면접관/HR 전용 화면에 들어가 있으면 지원자 탭으로 되돌림
      var activePane = document.querySelector(".pane.active");
      var activeId = activePane ? activePane.id : "";
      if(activeId === "pane-interviewer" || activeId === "pane-hr"){
        if(typeof switchTab === "function"){ try{ switchTab("applicant"); }catch(e){} }
      }
    }else{
      document.body.classList.remove("staff-mode");
      document.body.classList.remove("interview-mode");
      // 일반 지원자 링크: 면접관 전용(면접관/HR/일정취합) 화면에 있다면 지원자 탭으로 되돌림
      var activePane2 = document.querySelector(".pane.active");
      var activeId2 = activePane2 ? activePane2.id : "";
      if(activeId2 === "pane-interviewer" || activeId2 === "pane-hr" || activeId2 === "pane-schedule"){
        if(typeof switchTab === "function"){ try{ switchTab("applicant"); }catch(e){} }
      }
    }
  }
  // 해시 변경(#staff/#interview 추가·제거) 즉시 반영
  window.addEventListener("hashchange", applyMode);
  document.addEventListener("DOMContentLoaded", applyMode);
  applyMode();
})();
</script>
